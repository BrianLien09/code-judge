\`\`\`

用 https://developers.line.biz/flex-simulator/ 設計版面，再貼 JSON。

## 56.7 一次回多則

\`\`\`python
MessagingApi(api).reply_message(ReplyMessageRequest(
    reply_token=event.reply_token,
    messages=[
        TextMessage(text="第一則"),
        StickerMessage(packageId="446", stickerId="1988"),
        TextMessage(text="第三則"),
    ]
))
\`\`\`

最多 5 則。

## 56.8 訊息類型對應表（速查）

| 想做的事 | 用什麼 |
|----------|--------|
| 純回文字 | \`TextMessage\` |
| 回貼圖 | \`StickerMessage\` |
| 推圖片 | \`ImageMessage\` |
| 選單按鈕 | \`ButtonsTemplate\` |
| 多項選擇 | \`CarouselTemplate\` |
| 客製版面 | \`FlexMessage\` |
| 是非確認 | \`ConfirmTemplate\` |
| 引導加好友 | \`URIAction\` |

## 56.9 動手試試（模擬版）

範例設計一個「點餐 Bot」：根據訊息回不同 template。
`,
example:`# 模擬：根據訊息決定回什麼訊息類型
def reply(user_msg):
    # 回傳訊息類型 + 內容（模擬 LINE message 物件）
    m = user_msg.strip()

    # 1) 純文字
    if m == "hi" or m == "你好":
        return ("Text", "嗨嗨！我是點餐 Bot。輸入 'menu' 看菜單。")

    # 2) 主選單 → Buttons template
    if m == "menu":
        return ("Buttons", {
            "title": "點餐選單",
            "actions": ["牛肉麵 $120", "炒飯 $80", "拉麵 $150"]
        })

    # 3) 商品列表 → Carousel
    if m == "shop":
        return ("Carousel", {
            "items": [
                {"title": "T-shirt", "price": 350},
                {"title": "Cap",     "price": 280},
                {"title": "Mug",     "price": 180},
            ]
        })

    # 4) 確認 → Confirm template
    if m.startswith("buy "):
        item = m[4:]
        return ("Confirm", {
            "text": f"確定購買 {item}？",
            "yes": f"確認 {item}",
            "no":  "取消"
        })

    # 5) 點貼圖（記錄 sticker id）
    if m == "sticker":
        return ("Sticker", {"package": "446", "id": "1988"})

    # 6) 預設
    return ("Text", "聽不懂，輸入 'menu' 看選單")


tests = ["hi", "menu", "shop", "buy 牛肉麵", "sticker", "asdf"]
for msg in tests:
    msg_type, content = reply(msg)
    print(f"[USER] {msg}")
    if isinstance(content, str):
        print(f"  → {msg_type}: {content}")
    else:
        print(f"  → {msg_type}: {content}")
`},
{id:57,title:"狀態管理：讓 Bot 記住使用者",tag:"專項",content:`
# 第 57 章：狀態管理 — 讓 Bot 記住使用者

> 🤖 **專項教學 · Bot**：Bot 不只是「問答」——讓它記住「上次點的菜、累計簽到次數、對話流程」。

## 57.1 三種儲存方式

| 方式 | 適合 | 缺點 |
|------|------|------|
| **記憶體 dict** | 開發測試 | 程式重啟就沒了 |
| **JSON 檔** | 小型 Bot < 1000 人 | 多執行緒寫入會壞 |
| **SQLite** | 中型 Bot | 沒備援 |
| **PostgreSQL** | 正式上線 | 要部署 |
| **Redis** | 高速 / 快取 | 要部署 |

## 57.2 記憶體 dict（最簡單）

\`\`\`python
user_data = {}    # {user_id: {...}}

@bot.command()
async def signin(ctx):
    uid = ctx.author.id
    data = user_data.setdefault(uid, {"count": 0})
    data["count"] += 1
    await ctx.send(f"已連續簽到 {data['count']} 次")
\`\`\`

> ⚠️ **重啟就沒了**！

## 57.3 JSON 檔（持久化）

\`\`\`python
import json, pathlib, threading

LOCK = threading.Lock()
DATA = pathlib.Path("data.json")

def load():
    return json.loads(DATA.read_text()) if DATA.exists() else {}

def save(d):
    with LOCK:
        DATA.write_text(json.dumps(d, ensure_ascii=False, indent=2))

@bot.command()
async def signin(ctx):
    data = load()
    uid = str(ctx.author.id)
    data.setdefault(uid, {"count": 0})
    data[uid]["count"] += 1
    save(data)
    await ctx.send(f"已簽到 {data[uid]['count']} 次")
\`\`\`

> 💡 用 str(uid) 是因為 JSON key 只能是字串。

## 57.4 SQLite（推薦中型 Bot）

\`\`\`python
import sqlite3

conn = sqlite3.connect("bot.db")
conn.execute(
    "CREATE TABLE IF NOT EXISTS signin "
    "(user_id TEXT PRIMARY KEY, count INT)"
)

@bot.command()
async def signin(ctx):
    uid = str(ctx.author.id)
    row = conn.execute("SELECT count FROM signin WHERE user_id=?", (uid,)).fetchone()
    cnt = (row[0] if row else 0) + 1
    conn.execute(
        "INSERT INTO signin VALUES(?,?) "
        "ON CONFLICT(user_id) DO UPDATE SET count=excluded.count",
        (uid, cnt))
    conn.commit()
    await ctx.send(f"已簽到 {cnt} 次")
\`\`\`

## 57.5 對話流程（多步驟）

「!order 開始 → 問主餐 → 問副餐 → 問甜點 → 結帳」這種**有狀態**的流程：

\`\`\`python
sessions = {}    # {user_id: {"step": ..., "order": {...}}}

@bot.command()
async def order(ctx):
    sessions[ctx.author.id] = {"step": "main", "order": {}}
    await ctx.send("要點什麼主餐？(牛肉麵/炒飯)")

@bot.event
async def on_message(message):
    await bot.process_commands(message)
    s = sessions.get(message.author.id)
    if not s: return
    if s["step"] == "main":
        s["order"]["main"] = message.content
        s["step"] = "drink"
        await message.channel.send("要喝什麼？")
    elif s["step"] == "drink":
        s["order"]["drink"] = message.content
        s["step"] = None
        await message.channel.send(f"訂單：{s['order']} ✅")
        sessions.pop(message.author.id)
\`\`\`

## 57.6 注意事項

| 陷阱 | 解法 |
|------|------|
| 並發寫 JSON 損毀 | 用 threading.Lock 或改 SQLite |
| 記憶體爆炸 | 設過期：閒置 1 小時清除 session |
| 重啟丟資料 | 用 atexit 在退出前 save() |

## 57.7 動手試試

範例做完整的「對話狀態機」：點餐流程。
`,
example:`# 模擬：點餐 Bot 的對話狀態機 (FSM)
sessions = {}    # {user: {"step": str, "order": dict}}

def handle_message(user, text):
    s = sessions.get(user)

    # 起手指令
    if text == "/order":
        sessions[user] = {"step": "main", "order": {}}
        return "要點什麼主餐？(牛肉麵 / 炒飯 / 拉麵)"

    # 沒在會話中
    if s is None:
        return "輸入 /order 開始點餐"

    if s["step"] == "main":
        s["order"]["main"] = text
        s["step"] = "drink"
        return "要什麼飲料？(紅茶 / 綠茶 / 無)"

    if s["step"] == "drink":
        s["order"]["drink"] = text
        s["step"] = "confirm"
        order = s["order"]
        return f"確認訂單: {order['main']} + {order['drink']}? (yes/no)"

    if s["step"] == "confirm":
        if text.lower() == "yes":
            order = s["order"]
            sessions.pop(user)
            return f"✅ 訂單已送出: {order}"
        else:
            sessions.pop(user)
            return "已取消"

    return "??"

# 模擬使用者對話
dialog = [
    ("alice", "/order"),
    ("alice", "牛肉麵"),
    ("alice", "紅茶"),
    ("alice", "yes"),
    ("bob",   "hi"),
    ("bob",   "/order"),
    ("bob",   "炒飯"),
    ("bob",   "綠茶"),
    ("bob",   "no"),
]

for user, msg in dialog:
    reply = handle_message(user, msg)
    print(f"[{user}] {msg}")
    print(f"  → {reply}")

print(f"\\n剩餘 session: {list(sessions.keys())}")
`},
{id:58,title:"排程任務：定時推播",tag:"專項",content:`
# 第 58 章：排程任務 — 定時推播

> 🤖 **專項教學 · Bot**：每天早上 9 點推天氣、每週一統計上週活躍度。

## 58.1 三種排程方式

| 方式 | 適合 |
|------|------|
| \`asyncio.sleep\` 迴圈 | Discord/asyncio bot |
| \`schedule\` 套件 | 簡單同步腳本 |
| \`APScheduler\` | 進階：cron 語法、持久化 |

## 58.2 Discord 用 tasks（最常用）

\`\`\`python
from discord.ext import tasks

@tasks.loop(seconds=60)
async def heartbeat():
    channel = bot.get_channel(CHANNEL_ID)
    await channel.send("💓 還活著")

@bot.event
async def on_ready():
    heartbeat.start()
\`\`\`

| 參數 | 意思 |
|------|------|
| \`seconds=60\` | 每 60 秒 |
| \`minutes=5\` | 每 5 分鐘 |
| \`hours=1\` | 每小時 |
| \`time=datetime.time(hour=9)\` | 每天 09:00 |

## 58.3 每天固定時間推播

\`\`\`python
import datetime
from discord.ext import tasks

@tasks.loop(time=datetime.time(hour=9, minute=0, tzinfo=...))
async def morning_news():
    await channel.send("☀ 早安！今天天氣...")
\`\`\`

## 58.4 LINE 推播：用 push_message

LINE webhook 是被動的，要主動推用 \`push_message\`：

\`\`\`python
from linebot.v3.messaging import (
    MessagingApi, PushMessageRequest, TextMessage,
)

def daily_push():
    with ApiClient(config) as api_client:
        MessagingApi(api_client).push_message(
            PushMessageRequest(
                to=USER_ID,
                messages=[TextMessage(text="早安")]
            )
        )

# 配合 schedule
import schedule, time
schedule.every().day.at("09:00").do(daily_push)
while True:
    schedule.run_pending()
    time.sleep(60)
\`\`\`

## 58.5 schedule 套件語法

\`\`\`python
import schedule

schedule.every(10).seconds.do(job)
schedule.every().hour.do(job)
schedule.every().day.at("10:30").do(job)
schedule.every().monday.do(job)
schedule.every().wednesday.at("13:15").do(job)

while True:
    schedule.run_pending()
    time.sleep(1)
\`\`\`

## 58.6 APScheduler：cron 語法

\`\`\`python
from apscheduler.schedulers.background import BackgroundScheduler

sched = BackgroundScheduler()

# 每天 9 點
sched.add_job(daily_news, 'cron', hour=9)

# 每週一 10 點
sched.add_job(weekly_report, 'cron', day_of_week='mon', hour=10)

# 每 5 分鐘
sched.add_job(heartbeat, 'interval', minutes=5)

# 一次性 (10 秒後)
sched.add_job(reminder, 'date',
              run_date=datetime.now() + timedelta(seconds=10))

sched.start()
\`\`\`

## 58.7 算今天到下次執行的秒數

\`\`\`python
import datetime
def seconds_until(hour, minute=0):
    now = datetime.datetime.now()
    target = now.replace(hour=hour, minute=minute, second=0, microsecond=0)
    if target <= now:
        target += datetime.timedelta(days=1)   # 移到明天
    return (target - now).total_seconds()

async def daily_at(hour, minute, fn):
    while True:
        await asyncio.sleep(seconds_until(hour, minute))
        await fn()
\`\`\`

## 58.8 注意事項

| 陷阱 | 解法 |
|------|------|
| Bot 重啟錯過時間 | APScheduler \`misfire_grace_time\` |
| 時區搞錯 | 永遠帶 tzinfo |
| 推播超過配額 | 用 batch / multicast |
| 卡在 sleep | 用 asyncio 不要 time.sleep |

## 58.9 動手試試

範例自己實作「下次幾點觸發」的計算。
`,
example:`# 模擬：計算「下次每天 9:00 / 21:00 推播」的秒數
import datetime

def seconds_until(now, hour, minute=0):
    # 回傳從 now 到下次 hour:minute 還剩幾秒
    target = now.replace(hour=hour, minute=minute, second=0, microsecond=0)
    if target <= now:
        target += datetime.timedelta(days=1)
    return int((target - now).total_seconds())

# 用固定時間測試（不依賴系統時間）
tests = [
    (datetime.datetime(2026, 6, 8, 7, 30), 9, 0),    # 同天等到 9:00
    (datetime.datetime(2026, 6, 8, 9, 0),  9, 0),    # 整點 → 等明天
    (datetime.datetime(2026, 6, 8, 14, 0), 9, 0),    # 過了 → 等明天 9
    (datetime.datetime(2026, 6, 8, 14, 0), 21, 0),   # 同天 21:00
    (datetime.datetime(2026, 6, 8, 23, 30), 21, 0),  # 過了 → 等明天 21
]

print(f"{'now':<20} {'target':>8} {'秒數':>10} {'≈時間':>15}")
print('-' * 60)
for now, h, m in tests:
    secs = seconds_until(now, h, m)
    hr = secs // 3600
    mn = (secs % 3600) // 60
    print(f"{now!s:<20} {h:>2}:{m:02d}    {secs:>10}    {hr:>4}h{mn:02d}m")

# 模擬排程器：依時間表觸發
print("\\n=== 模擬一天的排程 ===")
schedule = [
    ("09:00", "推送早安"),
    ("12:00", "推送午餐提醒"),
    ("18:00", "推送收工提醒"),
    ("21:00", "推送晚安"),
]

# 假裝從 08:00 跑到 22:00
fake_now = datetime.datetime(2026, 6, 8, 8, 0)
end = datetime.datetime(2026, 6, 8, 22, 0)
while fake_now <= end:
    for t, job in schedule:
        h, m = map(int, t.split(":"))
        target = fake_now.replace(hour=h, minute=m, second=0)
        if target == fake_now:
            print(f"  [{t}] 執行：{job}")
    fake_now += datetime.timedelta(hours=1)
`},
{id:59,title:"部署上線：Render / Railway / VPS",tag:"專項",content:`
# 第 59 章：部署上線 — Render / Railway / VPS

> 🤖 **專項教學 · Bot**：本機關電腦 Bot 就掛了。學會 24/7 部署，Bot 才能真的「上線」。

## 59.1 選哪個平台？

| 平台 | 免費額度 | 適合 |
|------|----------|------|
| **Render** | 750 hours/月，閒置 15 分睡眠 | LINE Bot（睡了被叫醒會自動起來） |
| **Railway** | $5/月免費額度 | Discord Bot（不睡眠） |
| **Fly.io** | 256MB RAM 免費 | 進階 |
| **VPS**（DigitalOcean / Linode） | $5/月起 | 完全自主 |
| **Replit** | 免費可跑（要有人按 run） | 學習用 |

> 💡 **2024 起 Heroku 不再免費**。

## 59.2 部署前準備：3 個檔案

### \`requirements.txt\`
\`\`\`
discord.py==2.3.2
python-dotenv==1.0.0
\`\`\`

或 LINE：
\`\`\`
line-bot-sdk==3.5.0
flask==3.0.0
python-dotenv==1.0.0
\`\`\`

產生方式：
\`\`\`bash
pip freeze > requirements.txt
\`\`\`

### \`Procfile\`（告訴平台怎麼跑）
\`\`\`
# Discord
worker: python bot.py

# LINE (web service)
web: gunicorn app:app
\`\`\`

### \`.gitignore\`
\`\`\`
.env
__pycache__/
*.pyc
venv/
data.json     # 如果有本機測試資料
\`\`\`

## 59.3 Render 部署 LINE Bot

1. GitHub 推上去：
\`\`\`bash
git init
git add .
git commit -m "init"
git remote add origin git@github.com:你/bot.git
git push -u origin main
\`\`\`

2. https://dashboard.render.com → **New Web Service** → 連你的 repo
3. 設定：
   - Runtime: Python 3
   - Build Command: \`pip install -r requirements.txt\`
   - Start Command: \`gunicorn app:app\`
4. **Environment**：把 \`.env\` 的內容貼進去
5. Deploy → 拿到 \`https://your-bot.onrender.com\`
6. 回 LINE Developer Console，Webhook URL 改成 \`https://your-bot.onrender.com/callback\`

## 59.4 Railway 部署 Discord Bot

1. https://railway.app → **New Project → Deploy from GitHub**
2. 選 repo
3. Settings → Environment Variables → 加 \`DISCORD_TOKEN=...\`
4. Settings → Service Type → **Worker**（不是 web）
5. Deploys 完成

## 59.5 ngrok 本機測試（不部署）

只是想測 webhook，不想真部署：

\`\`\`bash
# 下載 ngrok https://ngrok.com/download
ngrok http 5000
# 輸出：https://abc123.ngrok-free.app
\`\`\`

- ✅ 5 秒就好
- ❌ 重開 ngrok 網址會變
- ❌ 關電腦就沒了

## 59.6 部署後常見錯誤

| 症狀 | 原因 |
|------|------|
| \`ModuleNotFoundError\` | 套件沒加進 requirements.txt |
| Bot 啟動就 crash | env 沒設好 |
| webhook verify 失敗 | URL 拼錯、SSL 沒生效 |
| 500 error | 看平台 logs，多半是程式內未接的例外 |
| Render 啟動很慢 | 免費方案睡眠 15 分後第一次 request 要 30 秒喚醒 |

## 59.7 監控 Bot 健康

最簡單：寫個 health check endpoint：

\`\`\`python
@app.route("/healthz")
def health():
    return {"status": "ok", "uptime": time.time() - START_TIME}
\`\`\`

用免費的 UptimeRobot（https://uptimerobot.com）每 5 分鐘打一次，掛了 email 通知。

## 59.8 升級路徑

| 階段 | 規模 | 建議架構 |
|------|------|----------|
| 學習 | 1-2 人測試 | 本機 + ngrok |
| 朋友圈 | < 100 人 | Render 免費 + SQLite |
| 開始紅 | < 1000 人 | Railway/Fly + PostgreSQL |
| 真正大 | 萬人以上 | 多 instance + Redis + 監控 |

## 59.9 動手試試（模擬版）

範例做「環境變數讀取 + 健康檢查」的核心邏輯。

> 🎉 **恭喜完成 Bot 主題 8 章！** 接下來自己選個方向：
> - 做一個校園活動通知 Bot
> - 做一個簡易記帳 Bot
> - 做一個爬題目庫的 APCS 練習 Bot（把前面學的爬蟲串起來）
`,
example:`# 模擬：讀取環境變數 + 啟動前檢查
import os, time

REQUIRED = ["DISCORD_TOKEN", "LINE_CHANNEL_SECRET", "DB_URL"]

# 假裝環境變數（真實是 os.environ 從 .env 或平台讀）
fake_env = {
    "DISCORD_TOKEN": "MTIz...REDACTED...abc",
    "LINE_CHANNEL_SECRET": "abc123secret",
    # DB_URL 故意沒設
    "PORT": "5000",
    "LOG_LEVEL": "INFO",
}

# 啟動前檢查
print("=== Bot 啟動檢查 ===")
missing = []
for key in REQUIRED:
    val = fake_env.get(key)
    if not val:
        missing.append(key)
        print(f"  ❌ {key}: 未設定")
    else:
        # 安全：不印完整 token
        masked = val[:4] + "..." + val[-4:] if len(val) > 12 else "***"
        print(f"  ✓  {key}: {masked}")

if missing:
    print(f"\\n⚠ 缺少環境變數: {missing}")
    print("  請到平台 Dashboard 設定 Environment Variables")
else:
    print("\\n✓ 所有必要環境變數齊全，可以啟動")

# 健康檢查 endpoint 概念
START_TIME = time.time()

def healthz():
    return {
        "status": "ok",
        "uptime_seconds": int(time.time() - START_TIME),
        "version": "1.0.0",
    }

print(f"\\n=== /healthz 回應 ===\\n{healthz()}")
`},
{id:60,title:"pygame 入門：game loop",tag:"專項",content:`
# 第 60 章：pygame 入門 — game loop

> 🎮 **專項教學 · pygame**：所有遊戲都是「畫面 → 收輸入 → 更新狀態 → 重畫」這個迴圈。

## 60.1 什麼是 pygame

\`pygame\` 是 Python 最常用的 2D 遊戲庫，免費、跨平台。適合：

- 學遊戲開發入門
- 程式設計教學
- 小型獨立遊戲
- 學校專題

不適合：3D / AAA 大作 / 手遊。

## 60.2 安裝

\`\`\`bash
pip install pygame
\`\`\`

確認安裝：
\`\`\`bash
python -m pygame.examples.aliens   # 跑官方範例
\`\`\`

## 60.3 最小程式：開一個視窗

\`\`\`python
import pygame

pygame.init()                            # 初始化所有模組
screen = pygame.display.set_mode((800, 600))   # 視窗大小 (寬, 高)
pygame.display.set_caption("我的第一個遊戲")
clock = pygame.time.Clock()

running = True
while running:
    # 1) 收事件
    for event in pygame.event.get():
        if event.type == pygame.QUIT:
            running = False

    # 2) 更新狀態（這次沒東西要更新）

    # 3) 畫面
    screen.fill((20, 20, 30))    # 深藍灰背景

    # 4) 把畫好的東西真的顯示出來
    pygame.display.flip()

    # 5) 控制速度：每秒 60 幀
    clock.tick(60)

pygame.quit()
\`\`\`

短短 20 行，視窗就跑起來了。

## 60.4 Game Loop 的四步驟

每張遊戲畫面都長這樣：

\`\`\`
while running:
    handle_events()    # 收鍵盤滑鼠
    update()           # 更新角色位置、判斷碰撞
    draw()             # 重畫所有東西
    clock.tick(60)     # 等到下一幀
\`\`\`

**這四步驟在任何遊戲引擎都一樣**（Unity / Godot / Unreal 內部都這結構）。

## 60.5 座標系：左上角是 (0, 0)

\`\`\`
(0,0) ────────► x
 │
 │
 ▼
 y
\`\`\`

跟數學課的座標**Y 軸是反的**——往下是 y 增加。

| 點 | 位置 |
|----|------|
| (0, 0) | 左上角 |
| (800, 0) | 右上角 |
| (0, 600) | 左下角 |
| (400, 300) | 螢幕中心 |

## 60.6 顏色：RGB

\`\`\`python
RED   = (255, 0, 0)
GREEN = (0, 255, 0)
BLUE  = (0, 0, 255)
WHITE = (255, 255, 255)
BLACK = (0, 0, 0)
\`\`\`

每個值 0-255。也可以加第四個值當透明度：\`(255, 0, 0, 128)\`。

## 60.7 為什麼要 clock.tick？

如果不限制速度：

- 高階電腦：每秒 10000 幀，遊戲超快
- 低階電腦：每秒 30 幀，遊戲超慢

\`clock.tick(60)\` 讓 **每台電腦都跑 60 fps**，遊戲體驗才一致。

## 60.8 動手試試（模擬版）

Pyodide 沒裝 pygame，範例用 ASCII 模擬一個「會動的點」game loop 概念。

> **跨語言對應**：
> - **JavaScript**：Phaser / PixiJS / 純 canvas
> - **C++**：SFML / SDL
> - **Java**：libGDX
> - **Unity (C#)** / **Godot (GDScript)**：大型遊戲引擎
> 都是相同的 game loop 結構，只是 API 不同。
`,
example:`# 模擬 game loop：印出每一幀的狀態
import time

# === 遊戲狀態 ===
state = {"x": 0, "y": 5, "frame": 0}
TARGET_FPS = 30
FRAME_DURATION = 1.0 / TARGET_FPS

# === 模擬的「事件佇列」===
fake_events = {3: "move_right", 6: "move_right", 9: "move_right", 11: "quit"}

# === Game Loop ===
running = True
while running:
    frame_start = time.time()

    # 1) handle events
    ev = fake_events.get(state["frame"])
    if ev == "quit":
        running = False
        continue
    elif ev == "move_right":
        state["x"] += 2

    # 2) update
    state["frame"] += 1

    # 3) draw (用 ASCII 模擬螢幕)
    width = 20
    line = ['.'] * width
    if 0 <= state["x"] < width:
        line[state["x"]] = '●'
    print(f"frame {state['frame']:2}: |{''.join(line)}|")

    # 4) tick (在模擬中跳過，避免 sleep)
    # 真實 pygame: clock.tick(60) 會等到下一幀

print(f"\\n結束：跑了 {state['frame']} 幀")
`},
{id:61,title:"畫圖形與座標",tag:"專項",content:`
# 第 61 章：畫圖形與座標

> 🎮 **專項教學 · pygame**：方塊、圓、線、圖片——五種基本繪圖技巧搞定 90% 畫面。

## 61.1 五種繪圖函式

\`\`\`python
import pygame

# 長方形
pygame.draw.rect(screen, color, (x, y, w, h), width=0)
# width=0 是實心、width>0 是空心（畫框）

# 圓形
pygame.draw.circle(screen, color, (cx, cy), radius)

# 線段
pygame.draw.line(screen, color, (x1, y1), (x2, y2), width=1)

# 多邊形
pygame.draw.polygon(screen, color, [(x1,y1), (x2,y2), (x3,y3)])

# 弧
pygame.draw.arc(screen, color, (x,y,w,h), start_rad, end_rad)
\`\`\`

## 61.2 Rect 物件：管理矩形的好朋友

\`\`\`python
rect = pygame.Rect(100, 50, 200, 100)   # x, y, w, h
rect.x, rect.y, rect.width, rect.height
rect.centerx, rect.centery
rect.left, rect.right, rect.top, rect.bottom
rect.center, rect.topleft, rect.bottomright
\`\`\`

可以用屬性直接定位：

\`\`\`python
rect.center = (400, 300)    # 把矩形中心設到螢幕中央
rect.bottomright = (800, 600)   # 右下角貼齊
\`\`\`

## 61.3 載入圖片

\`\`\`python
# 載入（通常在 game loop 外，只做一次）
player_img = pygame.image.load("player.png").convert_alpha()
# .convert_alpha() 處理 PNG 的透明
# .convert() 沒透明的 jpg 用這個

# 在 game loop 中畫
screen.blit(player_img, (x, y))   # 把圖貼到 (x, y)

# 取得圖片大小
w, h = player_img.get_size()
rect = player_img.get_rect(center=(400, 300))
screen.blit(player_img, rect)
\`\`\`

## 61.4 縮放、旋轉

\`\`\`python
# 縮放
small = pygame.transform.scale(img, (100, 100))
flipped = pygame.transform.flip(img, True, False)   # 水平翻轉

# 旋轉（每幀旋轉時要從原圖轉，避免畫質下降）
angle = 30
rotated = pygame.transform.rotate(img, angle)
rect = rotated.get_rect(center=original_center)
screen.blit(rotated, rect)
\`\`\`

## 61.5 繪圖順序很重要

\`pygame\` 是「先畫的會被後畫的蓋住」：

\`\`\`python
screen.fill(SKY_BLUE)           # 1. 天空（最底）
screen.blit(mountain_img, ...)  # 2. 山
screen.blit(tree_img, ...)      # 3. 樹
screen.blit(player_img, ...)    # 4. 主角（最上）
draw_ui(screen)                 # 5. UI 永遠最上
pygame.display.flip()           # 一次顯示
\`\`\`

## 61.6 完整範例：靜態場景

\`\`\`python
import pygame
pygame.init()
screen = pygame.display.set_mode((400, 300))

running = True
while running:
    for e in pygame.event.get():
        if e.type == pygame.QUIT: running = False

    screen.fill((135, 206, 235))    # 天空藍
    pygame.draw.rect(screen, (34, 139, 34), (0, 200, 400, 100))   # 草地
    pygame.draw.circle(screen, (255, 230, 50), (320, 60), 30)      # 太陽
    pygame.draw.polygon(screen, (139, 69, 19),                     # 山
                        [(50, 200), (150, 80), (250, 200)])
    pygame.display.flip()

pygame.quit()
\`\`\`

## 61.7 動手試試（模擬版）

範例用 ASCII grid 模擬「在畫布上畫矩形/線」的座標邏輯。
`,
example:`# 模擬：用 2D char array 當 screen，畫矩形與線
W, H = 30, 12
screen = [['.' for _ in range(W)] for _ in range(H)]

def fill(ch):
    for row in screen:
        for i in range(len(row)):
            row[i] = ch

def draw_rect(x, y, w, h, ch):
    # 空心矩形
    for i in range(w):
        if 0 <= x+i < W:
            if 0 <= y < H: screen[y][x+i] = ch
            if 0 <= y+h-1 < H: screen[y+h-1][x+i] = ch
    for j in range(h):
        if 0 <= y+j < H:
            if 0 <= x < W: screen[y+j][x] = ch
            if 0 <= x+w-1 < W: screen[y+j][x+w-1] = ch

def draw_line_h(x1, x2, y, ch):
    for x in range(min(x1, x2), max(x1, x2) + 1):
        if 0 <= x < W and 0 <= y < H:
            screen[y][x] = ch

def draw_circle(cx, cy, r, ch):
    # 用距離公式畫近似圓
    for y in range(H):
        for x in range(W):
            dx, dy = x-cx, y-cy
            if abs(dx*dx + dy*dy - r*r) <= r:
                screen[y][x] = ch

def show():
    print('+' + '-'*W + '+')
    for row in screen:
        print('|' + ''.join(row) + '|')
    print('+' + '-'*W + '+')

# 畫一個場景
fill(' ')
draw_line_h(0, W-1, H-2, '_')     # 地面
draw_rect(2, 5, 6, 5, '#')        # 房子
draw_rect(4, 7, 2, 3, 'D')        # 門
draw_circle(22, 3, 2, '*')        # 太陽
draw_rect(15, 8, 4, 2, 'C')       # 雲

show()
print(f"\\nscreen size: {W} x {H}")
`},
{id:62,title:"輸入處理：鍵盤與滑鼠",tag:"專項",content:`
# 第 62 章：輸入處理 — 鍵盤與滑鼠

> 🎮 **專項教學 · pygame**：遊戲沒輸入就只是影片。學會兩種 pygame 收輸入的方式。

## 62.1 兩種模式

### 模式 A：事件驅動（適合「按一下」）

\`\`\`python
for event in pygame.event.get():
    if event.type == pygame.KEYDOWN:
        if event.key == pygame.K_SPACE:
            player.jump()
        elif event.key == pygame.K_ESCAPE:
            running = False
\`\`\`

按一下觸發一次，適合：跳躍、開選單、暫停。

### 模式 B：狀態查詢（適合「按住」）

\`\`\`python
keys = pygame.key.get_pressed()
if keys[pygame.K_LEFT]:
    player.x -= 5
if keys[pygame.K_RIGHT]:
    player.x += 5
\`\`\`

每幀檢查當下按鍵狀態，適合：移動、衝刺、按住瞄準。

> 💡 大原則：**動作型（跳/射）用事件、移動類用狀態查詢**。

## 62.2 鍵盤常數速查

| 按鍵 | pygame 常數 |
|------|-------------|
| 方向鍵 | \`K_UP\`, \`K_DOWN\`, \`K_LEFT\`, \`K_RIGHT\` |
| WASD | \`K_w\`, \`K_a\`, \`K_s\`, \`K_d\` |
| 空白 | \`K_SPACE\` |
| Esc | \`K_ESCAPE\` |
| Enter | \`K_RETURN\` |
| Shift | \`K_LSHIFT\`, \`K_RSHIFT\` |
| 數字 | \`K_0\` ~ \`K_9\` |
| 字母 | \`K_a\` ~ \`K_z\`（一律小寫） |

## 62.3 滑鼠

\`\`\`python
# 事件式
for event in pygame.event.get():
    if event.type == pygame.MOUSEBUTTONDOWN:
        if event.button == 1:   # 左鍵
            print("左鍵:", event.pos)
        elif event.button == 3: # 右鍵
            print("右鍵:", event.pos)
    elif event.type == pygame.MOUSEMOTION:
        print("移動到", event.pos, "移動量", event.rel)

# 狀態查詢
mx, my = pygame.mouse.get_pos()
buttons = pygame.mouse.get_pressed()    # (左, 中, 右) bool
if buttons[0]:
    print("按著左鍵")
\`\`\`

## 62.4 文字輸入（高分數輸入名字）

\`\`\`python
name = ""
for event in pygame.event.get():
    if event.type == pygame.KEYDOWN:
        if event.key == pygame.K_RETURN:
            print("提交:", name)
        elif event.key == pygame.K_BACKSPACE:
            name = name[:-1]
        else:
            name += event.unicode    # 自動處理大小寫
\`\`\`

## 62.5 事件種類速查

| event.type | 何時觸發 |
|------------|----------|
| \`QUIT\` | 點視窗 x |
| \`KEYDOWN\` / \`KEYUP\` | 按下/放開鍵 |
| \`MOUSEBUTTONDOWN\` / \`MOUSEBUTTONUP\` | 滑鼠按鈕 |
| \`MOUSEMOTION\` | 滑鼠移動 |
| \`MOUSEWHEEL\` | 滾輪 |
| \`VIDEORESIZE\` | 視窗大小改變 |

## 62.6 暫停的最常見寫法

\`\`\`python
paused = False
while running:
    for e in pygame.event.get():
        if e.type == pygame.QUIT: running = False
        if e.type == pygame.KEYDOWN and e.key == pygame.K_p:
            paused = not paused

    if not paused:
        update_game()        # 暫停時不更新狀態

    draw_game()              # 但畫面持續畫（不然會卡住）
    if paused:
        draw_pause_overlay(screen)
    pygame.display.flip()
    clock.tick(60)
\`\`\`

## 62.7 動手試試（模擬版）

範例做事件佇列模擬：處理一連串按鍵與滑鼠輸入。
`,
example:`# 模擬：處理一連串輸入事件
# 玩家位置
player = {"x": 10, "y": 5}

# 模擬輸入事件（真實 pygame 從 pygame.event.get() 拿）
events = [
    ("KEYDOWN", "K_RIGHT"),
    ("KEYDOWN", "K_RIGHT"),
    ("KEYDOWN", "K_UP"),
    ("MOUSEBUTTONDOWN", 1, (15, 8)),    # 左鍵點 (15,8)
    ("KEYDOWN", "K_SPACE"),              # 跳
    ("KEYDOWN", "K_RIGHT"),
    ("MOUSEMOTION", (20, 10)),
    ("KEYDOWN", "K_ESCAPE"),             # 結束
]

print(f"玩家初始位置: ({player['x']}, {player['y']})\\n")

running = True
for ev in events:
    if not running: break

    if ev[0] == "KEYDOWN":
        key = ev[1]
        if key == "K_RIGHT":
            player["x"] += 1
            print(f"→ 右: 移到 ({player['x']}, {player['y']})")
        elif key == "K_LEFT":
            player["x"] -= 1
            print(f"← 左: 移到 ({player['x']}, {player['y']})")
        elif key == "K_UP":
            player["y"] -= 1
            print(f"↑ 上: 移到 ({player['x']}, {player['y']})")
        elif key == "K_DOWN":
            player["y"] += 1
            print(f"↓ 下: 移到 ({player['x']}, {player['y']})")
        elif key == "K_SPACE":
            print(f"🦘 跳！ 在 ({player['x']}, {player['y']})")
        elif key == "K_ESCAPE":
            print("結束遊戲")
            running = False

    elif ev[0] == "MOUSEBUTTONDOWN":
        button, pos = ev[1], ev[2]
        print(f"🖱 滑鼠 button={button} 點擊 {pos}")

    elif ev[0] == "MOUSEMOTION":
        pos = ev[1]
        print(f"🖱 滑鼠移到 {pos}")

print(f"\\n最終位置: ({player['x']}, {player['y']})")
`},
{id:63,title:"移動與動畫：速度向量",tag:"專項",content:`
# 第 63 章：移動與動畫 — 速度向量與 FPS

> 🎮 **專項教學 · pygame**：讓畫面真正「動」起來。掌握 velocity 與 delta time 是專業遊戲開發的分水嶺。

## 63.1 最簡單的移動：每幀加位移

\`\`\`python
x, y = 100, 100

while running:
    keys = pygame.key.get_pressed()
    if keys[pygame.K_RIGHT]: x += 5
    if keys[pygame.K_LEFT]:  x -= 5

    screen.fill((0,0,0))
    pygame.draw.circle(screen, WHITE, (x, y), 20)
    pygame.display.flip()
    clock.tick(60)
\`\`\`

問題：60 fps 跑 5 px/幀 = **300 px/秒**，30 fps 的電腦只有 150 px/秒——遊戲速度跟硬體綁定。

## 63.2 用速度向量（推薦）

\`\`\`python
import pygame
from pygame.math import Vector2

pos = Vector2(100, 100)
vel = Vector2(0, 0)
SPEED = 200    # px / 秒

while running:
    dt = clock.tick(60) / 1000    # ← delta time（這幀過了幾秒）

    keys = pygame.key.get_pressed()
    vel.x = (keys[pygame.K_RIGHT] - keys[pygame.K_LEFT]) * SPEED
    vel.y = (keys[pygame.K_DOWN]  - keys[pygame.K_UP])   * SPEED

    pos += vel * dt    # ← 用秒數算移動

    screen.fill((0,0,0))
    pygame.draw.circle(screen, WHITE, pos, 20)
    pygame.display.flip()
\`\`\`

不管 fps 多少，每秒永遠移動 200 px——遊戲體驗一致。

> 🎯 **delta time = 上一幀到這一幀的秒數**。\`clock.tick(60)\` 回傳的就是這個（毫秒）。

## 63.3 對角線移動的小坑

\`\`\`python
vel.x = 100    # 按右
vel.y = 100    # 按下
# 對角線實際速度 = √(100² + 100²) ≈ 141 px/s  ← 比直線快！
\`\`\`

修：

\`\`\`python
if vel.length() > 0:
    vel.scale_to_length(SPEED)
\`\`\`

## 63.4 加速度 / 慣性

\`\`\`python
ACCEL = 800      # px/s²
FRICTION = 0.85

while running:
    dt = clock.tick(60) / 1000
    keys = pygame.key.get_pressed()

    if keys[pygame.K_RIGHT]: vel.x += ACCEL * dt
    if keys[pygame.K_LEFT]:  vel.x -= ACCEL * dt

    vel *= FRICTION    # 摩擦力（簡化版）
    pos += vel * dt
\`\`\`

放開按鍵會慢慢停下，比較有「重量感」。

## 63.5 跳躍（最常見的物理）

\`\`\`python
GRAVITY = 1500
JUMP_VEL = -600
on_ground = True

while running:
    dt = clock.tick(60) / 1000
    for e in pygame.event.get():
        if e.type == pygame.KEYDOWN and e.key == pygame.K_SPACE:
            if on_ground:
                vel.y = JUMP_VEL
                on_ground = False

    vel.y += GRAVITY * dt   # 重力一直在
    pos += vel * dt

    if pos.y >= GROUND_Y:
        pos.y = GROUND_Y
        vel.y = 0
        on_ground = True
\`\`\`

## 63.6 動畫（換 sprite）

\`\`\`python
# 載入序列圖
frames = [pygame.image.load(f"run_{i}.png").convert_alpha() for i in range(4)]

frame_idx = 0
anim_timer = 0
ANIM_SPEED = 0.1   # 每 0.1 秒換一張

while running:
    dt = clock.tick(60) / 1000
    anim_timer += dt
    if anim_timer >= ANIM_SPEED:
        anim_timer = 0
        frame_idx = (frame_idx + 1) % len(frames)

    screen.blit(frames[frame_idx], pos)
\`\`\`

## 63.7 動手試試（模擬版）

範例做「彈跳球」物理模擬：重力 + 邊界反彈。
`,
example:`# 模擬：彈跳球（重力 + 反彈）
# 場地寬 40，地板 y=15
W, H = 40, 15
FPS = 30
GRAVITY = 30        # 加速度（單位/秒²）
JUMP_VEL = -25      # 跳起來的初速

ball = {"x": 5.0, "y": 10.0, "vx": 8.0, "vy": -20.0}

print(f"{'frame':>5} {'x':>6} {'y':>6} {'vy':>7}")
print('-' * 28)

for frame in range(1, 20):
    dt = 1 / FPS

    # 重力
    ball["vy"] += GRAVITY * dt

    # 更新位置
    ball["x"] += ball["vx"] * dt
    ball["y"] += ball["vy"] * dt

    # 邊界反彈
    if ball["x"] < 0:
        ball["x"] = 0; ball["vx"] = -ball["vx"]
    if ball["x"] > W - 1:
        ball["x"] = W - 1; ball["vx"] = -ball["vx"]
    if ball["y"] > H - 1:    # 撞地
        ball["y"] = H - 1
        ball["vy"] = -abs(ball["vy"]) * 0.7   # 損失 30% 能量
    if ball["y"] < 0:
        ball["y"] = 0; ball["vy"] = abs(ball["vy"])

    print(f"{frame:>5} {ball['x']:>6.1f} {ball['y']:>6.1f} {ball['vy']:>7.1f}")
`},
{id:64,title:"碰撞偵測：AABB 與 Rect",tag:"專項",content:`
# 第 64 章：碰撞偵測 — AABB 與 Rect

> 🎮 **專項教學 · pygame**：玩家踢到磚塊、子彈打中怪物、撿到道具——都是同一個問題。

## 64.1 矩形對矩形：AABB

最簡單最快：**Axis-Aligned Bounding Box**（兩個沒旋轉的矩形）。

\`pygame\` 一行：

\`\`\`python
if player.rect.colliderect(enemy.rect):
    player.hp -= 10
\`\`\`

自己寫的話：

\`\`\`python
def aabb_collide(r1, r2):
    return (r1.x < r2.x + r2.w and
            r1.x + r1.w > r2.x and
            r1.y < r2.y + r2.h and
            r1.y + r1.h > r2.y)
\`\`\`

## 64.2 點對矩形（滑鼠點 UI）

\`\`\`python
if button_rect.collidepoint(mouse_x, mouse_y):
    on_click()
\`\`\`

## 64.3 一對多

\`\`\`python
hit_index = player.rect.collidelist([e.rect for e in enemies])
if hit_index != -1:
    print(f"撞到 enemy[{hit_index}]")

# 全部撞到的索引
hit_all = player.rect.collidelistall([e.rect for e in enemies])
\`\`\`

## 64.4 群組碰撞（推薦：用 Sprite）

\`\`\`python
class Player(pygame.sprite.Sprite): ...
class Coin(pygame.sprite.Sprite): ...

player = Player(...)
coins = pygame.sprite.Group(Coin(...), Coin(...), Coin(...))

# 撞到哪些金幣（並自動移除）
hit = pygame.sprite.spritecollide(player, coins, dokill=True)
score += len(hit)
\`\`\`

## 64.5 圓對圓

\`\`\`python
def circle_collide(c1, r1, c2, r2):
    dx = c1[0] - c2[0]
    dy = c1[1] - c2[1]
    return dx*dx + dy*dy < (r1 + r2)**2     # ← 避免 sqrt 比較快
\`\`\`

## 64.6 像素級碰撞 (mask)

矩形碰撞會誤判（例如圓形/不規則形狀）。要精準到像素：

\`\`\`python
mask1 = pygame.mask.from_surface(img1)
mask2 = pygame.mask.from_surface(img2)
offset = (rect2.x - rect1.x, rect2.y - rect1.y)
if mask1.overlap(mask2, offset):
    print("真的撞到了")
\`\`\`

慢一些，**只在矩形已碰撞時才檢查**。

## 64.7 解決卡牆問題：x/y 分開檢查

\`\`\`python
# 錯：同時更新 x 與 y，撞牆時可能整個卡住
pos += vel * dt
if collide_with_walls(): ...

# 對：x 與 y 分開
pos.x += vel.x * dt
if collide_x_with_walls(): pos.x -= vel.x * dt   # 回退

pos.y += vel.y * dt
if collide_y_with_walls(): pos.y -= vel.y * dt
\`\`\`

這樣撞到牆還能沿著牆滑動，不會整個僵住。

## 64.8 完整子彈打怪物例子

\`\`\`python
bullets  = []       # list of (rect, vx)
enemies  = [...]
score = 0

while running:
    dt = clock.tick(60) / 1000

    # 子彈飛
    for b in bullets:
        b[0].x += b[1] * dt

    # 出畫面就移除
    bullets = [b for b in bullets if 0 <= b[0].x <= 800]

    # 碰撞
    for b in bullets[:]:
        for e in enemies[:]:
            if b[0].colliderect(e.rect):
                enemies.remove(e)
                bullets.remove(b)
                score += 10
                break
\`\`\`

## 64.9 動手試試（模擬版）

範例做「子彈 vs 怪物」AABB 碰撞偵測。
`,
example:`# 模擬：AABB 碰撞偵測 + 子彈打怪物
def aabb(r1, r2):
    return (r1["x"] < r2["x"] + r2["w"] and
            r1["x"] + r1["w"] > r2["x"] and
            r1["y"] < r2["y"] + r2["h"] and
            r1["y"] + r1["h"] > r2["y"])

# 場景
bullets = [
    {"x": 10, "y": 5, "w": 2, "h": 2},
    {"x": 20, "y": 8, "w": 2, "h": 2},
    {"x": 5,  "y": 5, "w": 2, "h": 2},
]
enemies = [
    {"id": "A", "x": 10, "y": 4, "w": 4, "h": 4},
    {"id": "B", "x": 25, "y": 7, "w": 4, "h": 4},
    {"id": "C", "x": 1,  "y": 1, "w": 4, "h": 4},
]

print("=== 碰撞檢測結果 ===")
score = 0
for i, b in enumerate(bullets):
    hit = None
    for e in enemies:
        if aabb(b, e):
            hit = e["id"]
            score += 10
            break
    print(f"子彈[{i}]@({b['x']},{b['y']}) → " + (f"撞到怪物 {hit}!" if hit else "沒撞到"))

print(f"\\n總分: {score}")

# 點對矩形
button = {"x": 100, "y": 50, "w": 80, "h": 30}
def in_button(px, py):
    return (button["x"] <= px <= button["x"] + button["w"] and
            button["y"] <= py <= button["y"] + button["h"])

mouse_tests = [(120, 60), (200, 100), (101, 51)]
print("\\n=== 滑鼠點擊按鈕 ===")
for mp in mouse_tests:
    print(f"  點 {mp}: {'命中' if in_button(*mp) else '沒中'}")
`},
{id:65,title:"文字與字型：HUD 與分數",tag:"專項",content:`
# 第 65 章：文字與字型 — 顯示分數與 UI

> 🎮 **專項教學 · pygame**：分數、HP、提示、結算畫面——遊戲不能沒文字。

## 65.1 三步驟畫文字

\`\`\`python
# 1) 建字型（通常在 loop 外，只做一次）
font = pygame.font.SysFont("Arial", 36)

# 2) render 成 Surface
text_surface = font.render("Hello", True, (255, 255, 255))
# True = 抗鋸齒 (anti-aliasing)，幾乎都要 True

# 3) blit 到螢幕
screen.blit(text_surface, (10, 10))
\`\`\`

## 65.2 用自帶字型 vs 自己準備字型

\`\`\`python
# 用系統字型
font = pygame.font.SysFont("Arial", 24)

# 列出所有系統可用字型
print(pygame.font.get_fonts())

# 用自己準備的字型檔（推薦——跨平台一致）
font = pygame.font.Font("assets/Roboto.ttf", 24)
\`\`\`

## 65.3 中文字型（最常踩雷）

預設字型沒有中文。要用內建支援中文的字型或自己準備：

\`\`\`python
# Mac: Apple Color Emoji, PingFang TC
# Win: Microsoft JhengHei
# 通用：思源黑體 (Noto Sans CJK)
font = pygame.font.SysFont("Microsoft JhengHei", 24)
# 或
font = pygame.font.Font("assets/NotoSansCJKtc-Regular.otf", 24)

text = font.render("你好世界", True, (255, 255, 255))
\`\`\`

> 💡 用自帶字型檔最穩，部署到別人電腦不會缺字。

## 65.4 置中文字

\`\`\`python
text_surface = font.render("GAME OVER", True, (255, 0, 0))
text_rect = text_surface.get_rect(center=(400, 300))
screen.blit(text_surface, text_rect)
\`\`\`

## 65.5 多行文字

\`render\` 不支援換行，要自己拆：

\`\`\`python
def draw_multiline(screen, font, text, color, x, y, line_height=30):
    for i, line in enumerate(text.split("\\n")):
        surface = font.render(line, True, color)
        screen.blit(surface, (x, y + i * line_height))

draw_multiline(screen, font, "第一行\\n第二行\\n第三行", (255,255,255), 10, 10)
\`\`\`

## 65.6 自動換行（按寬度）

\`\`\`python
def wrap_text(text, font, max_width):
    words = text.split(" ")
    lines = []
    cur = ""
    for w in words:
        test = cur + " " + w if cur else w
        if font.size(test)[0] <= max_width:
            cur = test
        else:
            lines.append(cur)
            cur = w
    if cur: lines.append(cur)
    return lines
\`\`\`

## 65.7 HUD（玩家頭上資訊）

\`\`\`python
# 永遠在最上層
def draw_hud(screen, score, hp, font):
    # 分數
    text = font.render(f"Score: {score}", True, (255, 255, 255))
    screen.blit(text, (10, 10))

    # HP 血條
    pygame.draw.rect(screen, (100, 0, 0), (10, 50, 200, 20))     # 底
    pygame.draw.rect(screen, (200, 0, 0), (10, 50, hp * 2, 20))  # 血
    hp_text = font.render(f"{hp}/100", True, (255, 255, 255))
    screen.blit(hp_text, (220, 50))
\`\`\`

## 65.8 動手試試（模擬版）

範例做 ASCII 版的「分數顯示」+「自動換行」邏輯。
`,
example:`# 模擬：分數顯示 + 自動換行
def render(text, max_width):
    # 把字串依 max_width 拆成多行（簡化版：按空白切）
    words = text.split()
    lines = []
    cur = ""
    for w in words:
        test = cur + " " + w if cur else w
        if len(test) <= max_width:
            cur = test
        else:
            lines.append(cur)
            cur = w
    if cur: lines.append(cur)
    return lines

# 模擬 HUD
score = 1240
hp = 75
max_hp = 100

print("=" * 40)
print(f"  Score: {score:6}     HP: {hp}/{max_hp}")

# 血條
filled = int(hp / max_hp * 30)
bar = '█' * filled + '░' * (30 - filled)
print(f"  [{bar}]")
print("=" * 40)

# 自動換行測試
msg = "Welcome to the game! Defeat all monsters to win the championship trophy."
print(f"\\n訊息（單行）:\\n  {msg}\\n")
print(f"自動換行（寬度 30）:")
for i, line in enumerate(render(msg, 30)):
    print(f"  L{i}: {line}")

# 模擬置中
def center_text(text, width):
    pad = (width - len(text)) // 2
    return ' ' * pad + text

print(f"\\n置中（寬度 40）:")
print(center_text("GAME OVER", 40))
print(center_text("Press R to restart", 40))
`},
{id:66,title:"音效與音樂",tag:"專項",content:`
# 第 66 章：音效與音樂

> 🎮 **專項教學 · pygame**：靜音遊戲沒靈魂。學會兩種音檔播放方式。

## 66.1 兩種音檔：SFX vs Music

| 類別 | API | 用途 | 特性 |
|------|-----|------|------|
| **音效 (SFX)** | \`pygame.mixer.Sound\` | 短：跳、撞擊、撿幣 | 預載到 RAM、可同時播多個 |
| **音樂 (BGM)** | \`pygame.mixer.music\` | 長：背景音樂 | 串流，一次只能播一首 |

## 66.2 音效 SFX

\`\`\`python
import pygame
pygame.mixer.init()   # 通常 pygame.init() 已包含

# 載入（loop 外）
jump_sfx = pygame.mixer.Sound("assets/jump.wav")
hit_sfx  = pygame.mixer.Sound("assets/hit.wav")
coin_sfx = pygame.mixer.Sound("assets/coin.wav")

# 設音量 0.0 ~ 1.0
jump_sfx.set_volume(0.7)

# 播
jump_sfx.play()
hit_sfx.play(loops=2)         # 重播 2 次
coin_sfx.play(fade_ms=200)    # 漸入
\`\`\`

支援格式：\`.wav\`（最穩）/ \`.ogg\`。\`.mp3\` 部分平台不支援。

## 66.3 同時播多個音效

\`mixer\` 預設給 8 個 channel，會自動分配：

\`\`\`python
pygame.mixer.set_num_channels(16)    # 同時最多 16 個音

# 自己指定 channel
ch = pygame.mixer.Channel(0)
ch.play(jump_sfx)
ch.set_volume(0.5)
\`\`\`

## 66.4 背景音樂 Music

\`\`\`python
pygame.mixer.music.load("assets/bgm.mp3")
pygame.mixer.music.set_volume(0.5)
pygame.mixer.music.play(loops=-1)    # -1 = 無限循環
pygame.mixer.music.play(loops=2, start=10.0)   # 從 10 秒開始播 2 次

# 控制
pygame.mixer.music.pause()
pygame.mixer.music.unpause()
pygame.mixer.music.stop()
pygame.mixer.music.fadeout(2000)   # 2 秒淡出

# 查詢
if pygame.mixer.music.get_busy():
    print("正在播音樂")
\`\`\`

## 66.5 按事件播音效

\`\`\`python
@event_handler(pygame.KEYDOWN)
def on_key(e):
    if e.key == pygame.K_SPACE:
        jump_sfx.play()

@event_handler("on_coin")
def on_coin(coin):
    coin_sfx.play()
    score += coin.value
\`\`\`

## 66.6 場景換音樂

\`\`\`python
def go_to_boss_room():
    pygame.mixer.music.fadeout(1000)
    pygame.mixer.music.queue("boss_bgm.ogg")   # 接著播
\`\`\`

## 66.7 音檔何處找

| 來源 | 特性 |
|------|------|
| freesound.org | 海量免費，CC 授權 |
| opengameart.org | 遊戲導向 |
| bfxr.net | 線上自己合成 8-bit 音效 |
| zapsplat.com | 註冊免費 |
| 自己錄 | 麥克風 + Audacity |

⚠️ 用音檔請看授權，CC0 / 商用免費才能用在自己作品。

## 66.8 動手試試（模擬版）

範例做「音效事件分派器」：根據遊戲事件決定播什麼音效。
`,
example:`# 模擬：音效事件分派器
class SoundMixer:
    def __init__(self):
        self.channels = []   # 同時播的音效
        self.music = None
        self.music_volume = 1.0

    def play_sfx(self, name, volume=1.0):
        # 真實 pygame: Sound(name).play()
        self.channels.append((name, volume))
        print(f"  🔊 SFX [{name}] vol={volume}")

    def play_music(self, name, loops=-1):
        if self.music:
            print(f"  🎵 停止 [{self.music}]")
        self.music = name
        print(f"  🎵 播放 BGM [{name}] loops={loops}")

    def fadeout_music(self, ms):
        if self.music:
            print(f"  🎵 [{self.music}] {ms}ms 淡出")
            self.music = None

mixer = SoundMixer()

# 模擬遊戲事件
events = [
    ("scene", "menu"),
    ("click", "start"),
    ("scene", "game"),
    ("player", "jump"),
    ("player", "jump"),
    ("collect", "coin"),
    ("collect", "coin"),
    ("collect", "coin"),
    ("hit", "enemy"),
    ("scene", "boss"),
    ("player", "die"),
    ("scene", "gameover"),
]

# 事件 → 音效對應
sfx_map = {
    ("click", "start"): "click.wav",
    ("player", "jump"): ("jump.wav", 0.7),
    ("player", "die"):  ("die.wav", 1.0),
    ("collect", "coin"): ("coin.wav", 0.5),
    ("hit", "enemy"):    ("hit.wav", 0.8),
}
bgm_map = {
    "menu":     "menu_bgm.ogg",
    "game":     "game_bgm.ogg",
    "boss":     "boss_bgm.ogg",
    "gameover": None,
}

for ev_type, ev_name in events:
    print(f"\\n[event] {ev_type}/{ev_name}")
    key = (ev_type, ev_name)
    if key in sfx_map:
        v = sfx_map[key]
        if isinstance(v, tuple):
            mixer.play_sfx(v[0], v[1])
        else:
            mixer.play_sfx(v)
    elif ev_type == "scene":
        bgm = bgm_map.get(ev_name)
        if bgm:
            mixer.play_music(bgm)
        else:
            mixer.fadeout_music(1500)

print(f"\\n總共播了 {len(mixer.channels)} 個音效")
`},
{id:67,title:"完整小遊戲：Pong",tag:"專項",content:`
# 第 67 章：完整小遊戲 — Pong（彈球）

> 🎮 **專項教學 · pygame**：把前 7 章全部整合。100 行內做出能玩的小遊戲。

## 67.1 設計

**Pong**（最早的電玩之一）：

- 左右各一塊板子，鍵盤上下控制
- 中間一顆球，撞牆反彈、撞板反彈
- 球出左右邊界 → 對方得分
- 先到 5 分獲勝

## 67.2 全部 code

\`\`\`python
import pygame
from pygame.math import Vector2
import random

pygame.init()
W, H = 800, 500
screen = pygame.display.set_mode((W, H))
pygame.display.set_caption("Pong")
clock = pygame.time.Clock()

WHITE = (255, 255, 255)
BG    = (10, 10, 30)
font  = pygame.font.SysFont("Arial", 48)

# === 物件 ===
PADDLE_W, PADDLE_H, BALL_R = 12, 80, 8
PADDLE_SPEED = 400

p1 = pygame.Rect(30, H//2 - PADDLE_H//2, PADDLE_W, PADDLE_H)
p2 = pygame.Rect(W - 30 - PADDLE_W, H//2 - PADDLE_H//2, PADDLE_W, PADDLE_H)

def reset_ball():
    ball.center = (W//2, H//2)
    vel.update(random.choice([-300, 300]), random.choice([-200, 200]))

ball = pygame.Rect(0, 0, BALL_R*2, BALL_R*2)
vel = Vector2(0, 0)
reset_ball()

score1, score2 = 0, 0
WIN_SCORE = 5

# === Loop ===
running = True
while running:
    dt = clock.tick(60) / 1000

    # 1) events
    for e in pygame.event.get():
        if e.type == pygame.QUIT: running = False

    # 2) input
    keys = pygame.key.get_pressed()
    if keys[pygame.K_w] and p1.top > 0: p1.y -= PADDLE_SPEED * dt
    if keys[pygame.K_s] and p1.bottom < H: p1.y += PADDLE_SPEED * dt
    if keys[pygame.K_UP]   and p2.top > 0: p2.y -= PADDLE_SPEED * dt
    if keys[pygame.K_DOWN] and p2.bottom < H: p2.y += PADDLE_SPEED * dt

    # 3) update
    ball.x += vel.x * dt
    ball.y += vel.y * dt

    # 上下牆反彈
    if ball.top <= 0 or ball.bottom >= H:
        vel.y *= -1

    # 撞板
    if ball.colliderect(p1) or ball.colliderect(p2):
        vel.x *= -1.05    # 反彈並加速
        vel.y += random.uniform(-50, 50)

    # 出界
    if ball.left <= 0:
        score2 += 1
        reset_ball()
    elif ball.right >= W:
        score1 += 1
        reset_ball()

    # 結束條件
    if max(score1, score2) >= WIN_SCORE:
        running = False

    # 4) draw
    screen.fill(BG)
    pygame.draw.rect(screen, WHITE, p1)
    pygame.draw.rect(screen, WHITE, p2)
    pygame.draw.ellipse(screen, WHITE, ball)
    pygame.draw.aaline(screen, (80, 80, 100), (W//2, 0), (W//2, H))   # 中線

    # 分數
    t1 = font.render(str(score1), True, WHITE)
    t2 = font.render(str(score2), True, WHITE)
    screen.blit(t1, (W//4 - t1.get_width()//2, 30))
    screen.blit(t2, (3*W//4 - t2.get_width()//2, 30))

    pygame.display.flip()

# === 結算 ===
winner = "P1" if score1 > score2 else "P2"
print(f"{winner} WIN! {score1} - {score2}")
pygame.quit()
\`\`\`

## 67.3 從這裡能延伸什麼

| 想加 | 怎麼做 |
|------|--------|
| 音效 | 撞板/得分時 \`pygame.mixer.Sound.play()\` |
| 粒子特效 | 撞擊位置生成小點，淡出消失 |
| AI 對手 | p2 自動追球：\`if ball.y > p2.centery: p2.y += SPEED * dt\` |
| 主選單 | 用「狀態機」：state = "menu" / "playing" / "gameover" |
| 多人連線 | 用 \`socket\` 或 WebSocket 同步 |

## 67.4 遊戲開發完整路徑

\`\`\`
你現在在這裡 ↓
├── Pong / 貪食蛇 (← 本章 100 行)
├── 平台跳躍 (Mario like)         ← 600 行
├── Top-down 射擊                ← 1500 行
├── RPG with 對話 / 道具          ← 5000+ 行
└── 用 Godot / Unity 做完整遊戲   ← 引擎輔助
\`\`\`

> 🎉 **恭喜完成到 Pong 這章！** 從第一個 \`print("Hello")\` 到完整小遊戲，你已經走過 Python 開發的完整 spectrum。
>
> 接下來最重要的一件事：**做一個自己想做的東西**。
> 不管是寫個工具、爬資料、做 Bot、做小遊戲，**完成 1 個小作品**比讀完 10 章新教材更能讓你進步。

## 67.5 動手試試（模擬版）

範例做純文字版的 Pong：球在 1D 軌道彈來彈去，玩家加分到 3 分結束。
`,
example:`# 模擬：簡化版 Pong（文字版）
# 球在 0~width 之間左右移動，撞牆會被反彈
# 球出左邊 → P2 得分；出右邊 → P1 得分
# 先到 3 分獲勝

WIDTH = 20
ball_x = 10.0
ball_vx = 1.0
score = [0, 0]
WIN = 3

frame = 0
while max(score) < WIN:
    frame += 1
    ball_x += ball_vx

    # 出界判定
    if ball_x < 0:
        score[1] += 1
        print(f"frame {frame:3} | ❗ P2 得分！ {score[0]}-{score[1]}")
        ball_x = WIDTH / 2
        ball_vx = 1.0
    elif ball_x > WIDTH:
        score[0] += 1
        print(f"frame {frame:3} | ❗ P1 得分！ {score[0]}-{score[1]}")
        ball_x = WIDTH / 2
        ball_vx = -1.0
    else:
        # 畫面
        pos = int(ball_x)
        line = ['·'] * (WIDTH + 1)
        if 0 <= pos <= WIDTH:
            line[pos] = '●'
        print(f"frame {frame:3} | P1|{''.join(line)}|P2  score={score}")

winner = "P1" if score[0] > score[1] else "P2"
print(f"\\n🏆 {winner} 獲勝！最終比數 {score[0]}-{score[1]}")
print(f"總共跑了 {frame} 幀")
`},
{id:68,title:"APCS 新制分級與程式識讀",tag:"APCS",
content:`# 68. APCS 新制分級與程式識讀

這一章把 APCS 新制整理成可以拿來練題的判準。官方新制把程式實作分成初級、中級、中高級、高級四種題本；程式識讀則考你讀懂程式流程、變數變化與輸出結果的能力。

## 68.1 先建立四級理解

| 等級 | 能力重點 | 看到題目時的判斷線索 |
|------|----------|----------------------|
| 初級 | 基礎程式設計能力 | 題目規則能直接翻成 if、loop、array 或 string 操作，限制通常不大 |
| 中級 | 序列型資料結構運用能力 | 需要處理一串資料、一張表、排序、前綴和、雙指標、滑動視窗或簡單 DP |
| 中高級 | 基礎資料結構運用能力 | 需要 stack、queue、set、map、hash、BFS/DFS、DSU、樹或較完整的狀態管理 |
| 高級 | 基礎演算法程序運用能力 | 暴力法通常不夠，需要最短路、進階 DP、分治、二分搜答案、字串雜湊或複雜度最佳化 |

簡單說：初級重在寫對，中級重在把序列資料整理好，中高級重在選對資料結構，高級重在把演算法和複雜度設計出來。

## 68.2 做題前的 5 步判斷

1. 先看輸入輸出格式，不要先想演算法。
2. 看資料範圍。N 小可以枚舉，N 到十萬以上通常需要 O(N log N) 或 O(N)。
3. 圈出關鍵字：連續、相異、最短、最多、區間、多次查詢、可重複、不能相鄰。
4. 用範例手算一次，確定你真的懂題意，不只是看懂中文。
5. 再決定資料結構：list、dict、set、queue、stack、heap、DSU 或 graph。

## 68.3 程式識讀技巧

程式識讀不是猜答案，是有方法地追蹤狀態。

| 題型 | 讀法 |
|------|------|
| 迴圈 | 寫追蹤表，欄位放 i、目前元素、關鍵變數、輸出 |
| 巢狀迴圈 | 先標出外層每次固定什麼，再看內層怎麼累加或更新 |
| 遞迴 | 先找終止條件，再畫呼叫樹，最後從最底層回推 |
| list/dict/set | 追蹤每次新增、刪除、覆蓋，特別注意同一個 key 會被更新 |
| 輸出題 | 每次 print 都寫下來，空白與換行也要算進去 |

常見陷阱：整數除法、索引從 0 開始、range 結尾不包含、break/continue、變數在迴圈外保留、list 被原地修改、函式呼叫有副作用。

## 68.4 追蹤表長什麼樣

看到迴圈時，把腦中的模糊感變成表格：

| i | x | 動作 | ans |
|---|---|------|-----|
| 0 | 3 | 偶數索引，加上 x | 3 |
| 1 | 1 | 奇數索引，減掉 x | 2 |
| 2 | 4 | 偶數索引，加上 x | 6 |
| 3 | 1 | 奇數索引，減掉 x | 5 |
| 4 | 5 | 偶數索引，加上 x | 10 |

APCS 程式識讀常常不是程式很長，而是容易在一兩個變數上看錯。把變數寫成表，錯誤率會明顯下降。

## 68.5 回到題庫怎麼練

本題庫已把 125 題重新分成四級：

| 等級 | 題數 |
|------|------|
| 初級 | 36 |
| 中級 | 49 |
| 中高級 | 27 |
| 高級 | 13 |

建議練習路線：

1. 初級先刷到能快速完成，重點是輸入處理、條件分支與邊界。
2. 中級開始整理自己的模板：排序、前綴和、二分搜尋、滑動視窗、簡單 DP。
3. 中高級開始記錄「我為什麼選這個資料結構」。
4. 高級每題都要先寫複雜度，再寫程式。

> 小提醒：題本等級不是人的等級。今天卡在中級，只代表這一類資料處理還需要練，不代表你不適合寫程式。
`,
example:`# 程式識讀練習：先不要執行，自己追一次表格

a = [3, 1, 4, 1, 5]
ans = 0

for i, x in enumerate(a):
    if i % 2 == 0:
        ans += x
    else:
        ans -= x
    print(i, x, ans)

print("final", ans)

# 預期輸出：
# 0 3 3
# 1 1 2
# 2 4 6
# 3 1 5
# 4 5 10
# final 10
`},

{id:69,title:"🔥 快速冪與模運算【高級題】",tag:"高級",content:`
# 第 69 章：快速冪與模運算 🔥【高級題】

> 🎯 看到 \`a^n mod m\`、n 很大（10^9 以上）、或題目給「答案請對 1000000007 取模」——就是這章。

## 69.1 為什麼不能直接乘？
n = 10^9 時，迴圈乘 n 次絕對 TLE；而且就算不超時，整數也會爆。
**快速冪**用「平方分解」把 O(n) 壓到 **O(log n)**。

## 69.2 核心觀察
\`a^n\` 可以拆成：
- 若 n 是偶數：\`a^n = (a^(n/2))^2\`
- 若 n 是奇數：\`a^n = a · a^(n-1)\`

每一步問題規模砍半 → log n 步。

## 69.3 迭代版（推薦背這個）
\`\`\`python
def fast_pow(a, n, mod=None):
    result = 1
    while n > 0:
        if n & 1:               # n 的最低位是 1
            result = result * a
            if mod: result %= mod
        a = a * a
        if mod: a %= mod
        n >>= 1                  # n //= 2
    return result

print(fast_pow(2, 10))                 # 1024
print(fast_pow(2, 10**9, 10**9 + 7))   # 模運算下的 2^(10^9)
\`\`\`

## 69.4 Python 內建——其實有現成的
\`\`\`python
pow(2, 10**9, 10**9 + 7)    # C 實作、最快
\`\`\`
**APCS 寫 Python 直接用 \`pow(a, n, m)\` 就好**；但 C/C++/Java 一定要會手刻。

## 69.5 C++ 版本（高級題模板）
\`\`\`cpp
typedef long long ll;
ll fast_pow(ll a, ll n, ll mod) {
    ll res = 1; a %= mod;
    while (n > 0) {
        if (n & 1) res = res * a % mod;
        a = a * a % mod;
        n >>= 1;
    }
    return res;
}
\`\`\`
> ⚠️ 用 \`long long\`，否則 \`a*a\` 會溢位。

## 69.6 應用一：模逆元（費馬小定理）
當 \`mod\` 是質數時，\`a 的反元素 = a^(mod-2) mod\`：
\`\`\`python
MOD = 10**9 + 7
inv = pow(a, MOD-2, MOD)        # a 在模 MOD 下的反元素
\`\`\`
這在組合數 \`C(n,k) mod p\` 題型常見。

## 69.7 應用二：矩陣快速冪 → 線性遞迴加速
費氏數列可以寫成矩陣：
\`\`\`
[F(n+1)]   [1 1]^n  [F(1)]
[F(n)  ] = [1 0]  · [F(0)]
\`\`\`
配合矩陣快速冪 → O(log n) 算第 n 個費氏數。是高級 DP 加速的常見手段。

## 69.8 陷阱清單
- 模運算下不能直接除法 → 改乘上模逆元
- \`a\` 進函式前先 \`a %= mod\` 一次，避免一開始就溢位
- \`n = 0\` 時答案是 1（注意 \`0^0\` 慣例為 1）

## 69.9 試試看
`,example:`# 比較三種寫法的速度
import time

def slow_pow(a, n, mod):
    r = 1
    for _ in range(n):
        r = r * a % mod
    return r

def fast_pow(a, n, mod):
    r = 1; a %= mod
    while n > 0:
        if n & 1: r = r * a % mod
        a = a * a % mod
        n >>= 1
    return r

a, n, mod = 3, 1_000_000, 10**9 + 7

t = time.time(); v1 = slow_pow(a, n, mod);   t1 = time.time()-t
t = time.time(); v2 = fast_pow(a, n, mod);   t2 = time.time()-t
t = time.time(); v3 = pow(a, n, mod);        t3 = time.time()-t

print(f"slow_pow : {v1}  耗時 {t1:.4f}s")
print(f"fast_pow : {v2}  耗時 {t2:.6f}s")
print(f"內建 pow : {v3}  耗時 {t3:.6f}s")
print(f"\\n快速冪比迴圈快 {t1/max(t2,1e-9):.0f} 倍")
`},

# 第 70 章：分治與逆序對 🔥【高級題】

> 🎯 「逆序對個數」(\`i < j\` 但 \`a[i] > a[j]\`) 是 APCS 高級題常考——也是把「合併排序」用在計數上的經典例子。

## 70.1 分治三步驟
1. **拆**：把問題切成兩半（通常從中點）
2. **解**：遞迴解左半、右半
3. **併**：把兩個子答案合起來，並算「跨越中線的貢獻」

合併排序、最近點對、最大子陣列分治版……都套這個骨架。

## 70.2 為什麼 O(n²) 不夠？
直觀寫法：雙層 for 數逆序對 → 1e5 筆資料就要 10^10 次比較，**TLE**。
分治可以做到 **O(n log n)**。

## 70.3 合併排序回顧
\`\`\`python
def merge_sort(a):
    if len(a) <= 1: return a
    mid = len(a) // 2
    L = merge_sort(a[:mid])
    R = merge_sort(a[mid:])
    return merge(L, R)

def merge(L, R):
    out, i, j = [], 0, 0
    while i < len(L) and j < len(R):
        if L[i] <= R[j]:
            out.append(L[i]); i += 1
        else:
            out.append(R[j]); j += 1
    out += L[i:]; out += R[j:]
    return out
\`\`\`

## 70.4 改裝成「邊排序邊算逆序對」
**關鍵觀察**：當合併時取了右邊的 \`R[j]\`，代表 L 中「還沒取出來」的所有元素 \`L[i..]\` 都比 \`R[j]\` 大 → 一次貢獻 \`len(L) - i\` 對逆序對。

\`\`\`python
def count_inv(a):
    def go(a):
        if len(a) <= 1: return a, 0
        mid = len(a) // 2
        L, cL = go(a[:mid])
        R, cR = go(a[mid:])
        out, i, j, c = [], 0, 0, 0
        while i < len(L) and j < len(R):
            if L[i] <= R[j]:
                out.append(L[i]); i += 1
            else:
                out.append(R[j]); j += 1
                c += len(L) - i      # ← 一次累計
        out += L[i:]; out += R[j:]
        return out, cL + cR + c
    return go(a)[1]

print(count_inv([2, 4, 1, 3, 5]))   # 3：(2,1)(4,1)(4,3)
\`\`\`
時間 **O(n log n)**、空間 O(n)。

## 70.5 為什麼計數對是 \`len(L) - i\`？
合併時兩邊**各自已排序**。如果 \`L[i] > R[j]\`，那麼 \`L[i], L[i+1], …, L[-1]\` 全部都 > \`R[j]\`；
而它們的原始 index 都在 \`R[j]\` 的左邊（因為 L 是左半） → 它們全都跟 \`R[j]\` 形成逆序對。

## 70.6 另一招：BIT (Binary Indexed Tree) 也能算
離散化 + BIT 從右往左掃，每次查「比目前 a[i] 小的有幾個」累加。
也是 O(n log n)、空間 O(n)。實作較多但常數小。
（BIT 的細節超出本章範圍，先建立「分治版」的直覺即可。）

## 70.7 變體題
- 數「**順序對**」：把 \`<=\` 改成 \`<\` 或對稱處理即可
- 數「\`a[i] - a[j] > k\` 的對數」：合併時改用雙指標
- 最大子陣列分治版（CLRS 經典）：left 內最大 / right 內最大 / 跨中線最大，三者取 max

## 70.8 試試看
`,example:`# 比較 O(n²) 暴力 vs O(n log n) 分治
import time, random

def brute(a):
    n = len(a); c = 0
    for i in range(n):
        for j in range(i+1, n):
            if a[i] > a[j]: c += 1
    return c

def fast(a):
    def go(a):
        if len(a) <= 1: return a, 0
        m = len(a)//2
        L, cL = go(a[:m]); R, cR = go(a[m:])
        out, i, j, c = [], 0, 0, 0
        while i < len(L) and j < len(R):
            if L[i] <= R[j]: out.append(L[i]); i += 1
            else: out.append(R[j]); j += 1; c += len(L)-i
        out += L[i:]; out += R[j:]
        return out, cL+cR+c
    return go(a)[1]

random.seed(0)
arr = [random.randint(1, 10**6) for _ in range(3000)]

t = time.time(); b = brute(arr); t1 = time.time()-t
t = time.time(); f = fast(arr);  t2 = time.time()-t

print(f"暴力 O(n²)    答案 = {b}  耗時 {t1:.4f}s")
print(f"分治 O(n log n) 答案 = {f}  耗時 {t2:.4f}s")
print(f"\\n結果一致：{b == f}    分治快 {t1/max(t2,1e-9):.1f} 倍")
`}

// ── 常見錯誤訊息翻譯 ─────────────────────────────────────────────────────
function translateError(raw){
  if(!raw) return '';
  const lines = raw.split('\n');
  let last = '';
  for(let i = lines.length - 1; i >= 0; i--){
    if(lines[i].trim()){ last = lines[i]; break; }
  }
  const rules = [
    {re:/NameError: name '(.+?)' is not defined/, msg:(m)=>`<b>變數沒定義</b>：你用了 <code>${m[1]}</code>，但前面從沒設定它的值。檢查拼字、或在使用前先 <code>${m[1]} = ...</code>。`},
    {re:/IndentationError|unexpected indent|expected an indented block/, msg:()=>`<b>縮排錯了</b>：Python 用空白來分組，<code>if</code>/<code>for</code>/<code>def</code> 下一行一定要往內縮 4 個空白。同一段也要對齊。`},
    {re:/SyntaxError: invalid syntax/, msg:()=>`<b>語法錯誤</b>：通常是漏冒號 <code>:</code>、漏括號、引號沒成對。看一下錯誤指到的那一行附近。`},
    {re:/SyntaxError: EOL while scanning string literal|unterminated string/, msg:()=>`<b>字串沒收尾</b>：開了 <code>"</code> 或 <code>'</code> 但沒關起來。`},
    {re:/ZeroDivisionError/, msg:()=>`<b>除以 0 了</b>：檢查除號右邊的值是不是 0，或先用 if 擋掉。`},
    {re:/TypeError: unsupported operand type.*'(\w+)'.* and '(\w+)'/, msg:(m)=>`<b>型別不能相加 / 相減</b>：<code>${m[1]}</code> 和 <code>${m[2]}</code> 不能直接運算。常見：字串 + 數字 → 要先 <code>str()</code> 或 <code>int()</code>。`},
    {re:/TypeError: '(\w+)' object is not (subscriptable|iterable|callable)/, msg:(m)=>`<b>型別錯用</b>：<code>${m[1]}</code> 物件不能被「${m[2]==='subscriptable'?'用 []':m[2]==='iterable'?'用 for 走訪':'呼叫'}」。`},
    {re:/TypeError/, msg:()=>`<b>型別錯誤</b>：兩邊型別不合（例如字串 + 數字）。用 <code>int(x)</code> / <code>str(x)</code> 轉換看看。`},
    {re:/ValueError: invalid literal for int\(\)/, msg:()=>`<b>int() 收到不是數字的字串</b>：例如 <code>int("abc")</code> 會錯。檢查 input 是不是有空白或非數字字元。`},
    {re:/ValueError/, msg:()=>`<b>值不合法</b>：函式收到它不接受的值。看看你傳了什麼。`},
    {re:/IndexError: list index out of range/, msg:()=>`<b>list 索引超出範圍</b>：list 只有 0 到 len(list)-1。檢查迴圈條件是不是寫成 <code><=</code> 變成多跑一格。`},
    {re:/IndexError/, msg:()=>`<b>索引超出範圍</b>：要存取的位置不存在。`},
    {re:/KeyError: '?(.+?)'?$/, msg:(m)=>`<b>字典找不到這個 key</b>：<code>${m[1]}</code> 不在字典裡。用 <code>d.get(key, 預設值)</code> 比較安全。`},
    {re:/AttributeError: '(\w+)' object has no attribute '(\w+)'/, msg:(m)=>`<b>物件沒這個方法</b>：<code>${m[1]}</code> 沒有 <code>.${m[2]}()</code>。檢查拼字，或是不是用錯型別（例如把 str 當 list 用）。`},
    {re:/RecursionError/, msg:()=>`<b>遞迴太深</b>：函式呼叫自己沒有終止條件，或終止條件永遠到不了。檢查 base case。`},
    {re:/ModuleNotFoundError|ImportError/, msg:()=>`<b>找不到模組</b>：可能是這個套件瀏覽器版 Python 沒有。試試標準函式庫的功能。`}
  ];
  for(const r of rules){
    const m = last.match(r.re);
    if(m) return `<div class="err-hint">💡 ${r.msg(m)}</div>`;
  }
  return '';
}

let beginnerMode = (localStorage.getItem('tut_beginner') ?? '1') === '1';
let completed = new Set(JSON.parse(localStorage.getItem('tut_done') || '[]'));
function saveState(){
  localStorage.setItem('tut_beginner', beginnerMode ? '1' : '0');
  localStorage.setItem('tut_done', JSON.stringify([...completed]));
}
function isUnlocked(id){ return true; }
function markDone(id){
  if(!completed.has(id)){
    completed.add(id);
    saveState();
    updateProgress();
    renderChapList();
  }
}
function updateProgress(){
  const total = CHAPTERS.length;
  const done = [...completed].filter(x => x >= 0 && x < total).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = `${done} / ${total} 章`;
  document.getElementById('prog-pct').textContent = pct + '%';
}
function updateStaticCounts(){
  document.getElementById('chapter-total').textContent = CHAPTERS.length;
}

function renderMeta(chap){
  const meta = CHAPTER_META[chap.id];
  if(!meta) return '';
  let html = '';
  if(meta.learn?.length){
    html += `<div class="learn-box"><div class="lh">🎯 這章你會學到</div><ul>${meta.learn.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  }
  if(meta.try?.length){
    html += `<div class="try-box"><div class="lh">✋ 動手試試（改右邊程式碼）</div><ol>${meta.try.map(x=>`<li>${x}</li>`).join('')}</ol></div>`;
  }
  if(meta.code){
    const st = codeQuizState[chap.id];
    const stdinDisp = meta.code.stdin ? `<pre class="cq-io">${escapeHtml(meta.code.stdin)}</pre>` : '<i class="cq-none">（無輸入）</i>';
    const pyOnly = chap.id >= 27;
    html += `<div class="quiz-box"><div class="lh">📝 程式練習（在右邊編輯器寫程式碼，按下方按鈕檢查）</div>`;
    if(pyOnly && currentLang !== 'py'){
      html += `<div class="cq-pyhint">💡 本章程式練習以 Python 為基準（涉及檔案 / 模組 / OOP / API 等 Python 慣用法）。請先切到 Python 嘗試，或直接讀左邊教材的概念。</div>`;
    }
    html += `<div class="cq-task">${meta.code.task}</div>`;
    html += `<div class="cq-row"><div class="cq-col"><div class="cq-label">標準輸入</div>${stdinDisp}</div>`;
    html += `<div class="cq-col"><div class="cq-label">預期輸出</div><pre class="cq-io">${escapeHtml(meta.code.expect)}</pre></div></div>`;
    html += `<button class="cq-btn" id="check-btn-${chap.id}" onclick="checkAnswer(${chap.id})">▶ 執行並檢查答案</button>`;
    if(st){
      if(st.status === 'pass'){
        html += `<div class="quiz-status pass">🎉 通過！${chap.id < CHAPTERS.length-1 ? '繼續下一章吧' : '你已經完成全部教學！'}</div>`;
      } else {
        html += `<div class="quiz-status fail">❌ 輸出不符。你的輸出：<pre class="cq-io">${escapeHtml(st.got)}</pre>修一修再按一次。</div>`;
      }
    }
    html += `</div>`;
  }
  return html;
}
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pickQuiz(chapId, qi, oi){
  if(!quizState[chapId]) quizState[chapId] = {};
  if(quizState[chapId][qi] !== undefined) return; // 已作答
  quizState[chapId][qi] = oi;
  if(currentChap && currentChap.id === chapId) selectChap(chapId, {preserveEditor:true});
}

# 第 1 章：變數與資料型別 (C++)

## 1.1 變數要先宣告型別
C++ 是**強型別**語言，宣告時要說清楚變數是什麼型別：

\`\`\`cpp
int age = 17;          // 整數
double height = 168.5; // 浮點數
string name = "Alice"; // 字串（要 #include <string>）
bool ok = true;        // 布林
\`\`\`

## 1.2 四大基本型別
| 型別 | 範例 | 範圍 |
|------|------|------|
| int | \`42\` | 約 ±21 億 |
| long long | \`42LL\` | 約 ±9×10¹⁸ |
| double | \`3.14\` | 浮點數 |
| string | \`"hi"\` | 字串 |
| bool | \`true / false\` | 真假 |

## 1.3 型別轉換
\`\`\`cpp
int x = (int)3.7;          // 3（直接截斷）
double y = (double)5 / 2;  // 2.5
string s = to_string(42);  // "42"
int n = stoi("42");        // 42
\`\`\`

> **APCS 重點**：整數除法不會自動變浮點！\`5 / 2\` 在 C++ 是 \`2\`（不是 2.5），要 \`(double)5/2\` 才會得到 2.5。

# 第 3 章：運算子與表達式 (C++)

## 3.1 算術運算子
跟 Python 大致相同：\`+ - * / %\`

**但要注意：**
- \`/\` **看型別**！\`5 / 2 = 2\`（整數），\`5.0 / 2 = 2.5\`（浮點）
- Python 的 \`//\` 在 C++ 就是 \`/\`（當兩邊都是整數時）
- \`%\` 取餘數：\`17 % 5 = 2\`

## 3.2 拆三位數
\`\`\`cpp
int n = 752;
int h = n / 100;       // 7
int t = n / 10 % 10;   // 5
int o = n % 10;        // 2
\`\`\`

## 3.3 自增 / 自減
C++ 特有寫法：

\`\`\`cpp
i++;   // 等同 i = i + 1
i--;   // 等同 i = i - 1
\`\`\`

> **整數溢位**：int 最大約 21 億。算次方、階乘容易爆，用 \`long long\` 才安全：\`long long x = 1e18;\`
`,

# 第 4 章：條件判斷 (C++)

## 4.1 if / else if / else
\`\`\`cpp
if (score >= 90) {
    cout << "A";
} else if (score >= 80) {
    cout << "B";
} else {
    cout << "C";
}
\`\`\`

## 4.2 條件運算子（短路三元）

int max_v = (a > b) ? a : b;   // a 大就取 a 不然取 b
\`\`\`

## 4.3 邏輯運算子
| 運算子 | Python 對應 |
|--------|------------|
| \`&&\` | and |
| \`\|\|\` | or |
| \`!\` | not |

## 4.4 switch（多分支）
\`\`\`cpp
switch (grade) {
    case 'A': cout << "Excellent"; break;
    case 'B': cout << "Good"; break;
    default: cout << "Try harder";
}
\`\`\`

> **常見錯誤**：if 只有一行可以不寫 \`{}\`，但建議都寫，避免 dangling else。

> **比較 == 與 =**：if (x = 5) 是賦值並永遠為真！要 \`==\` 才是比較。

string s = "Hello APCS";

C++ 的 list 對應就是 \`std::vector\`。

## 7.1 建立與操作
\`\`\`cpp
#include <vector>
vector<int> v;                 // 空
vector<int> v2 = {3, 1, 4};    // 直接給
vector<int> v3(10, 0);         // 10 個 0

v.push_back(5);                // 加到尾端

for (int i = 0; i < v.size(); i++) cout << v[i];
for (int x : v) cout << x;     // 簡潔版
\`\`\`

## 7.3 常用演算法（<algorithm>）
\`\`\`cpp
sort(v.begin(), v.end());                      // 排序
reverse(v.begin(), v.end());                   // 反轉
int s = accumulate(v.begin(), v.end(), 0);     // 總和 <numeric>
int mx = *max_element(v.begin(), v.end());     // 最大
int c = count(v.begin(), v.end(), 5);          // 5 出現幾次

# 第 7 章：陣列 (C)

C 沒有動態陣列（Python 的 list），用**固定大小陣列**。

## 7.1 宣告
\`\`\`c
int a[100];                    // 100 個 int（未初始化）
int a[100] = {0};              // 全 0
int a[] = {3, 1, 4, 1, 5};     // 編譯器自動算大小
int n = sizeof(a) / sizeof(int);
\`\`\`

## 7.2 存取與走訪
\`\`\`c
a[0] = 42;
for (int i = 0; i < n; i++) printf("%d ", a[i]);
\`\`\`

## 7.3 排序（qsort）
\`\`\`c
int cmp(const void* a, const void* b){
    return *(int*)a - *(int*)b;
}
qsort(a, n, sizeof(int), cmp);
\`\`\`

## 7.4 常見運算
\`\`\`c
int sum = 0, mx = a[0];
for (int i = 0; i < n; i++) {
    sum += a[i];
    if (a[i] > mx) mx = a[i];
}
\`\`\`

> **新手陷阱**：陣列大小要編譯時就知道。需要動態大小要用 malloc：
> \`int* a = (int*)malloc(n * sizeof(int));\`

# 第 8 章：二維陣列 (C++)

## 8.1 兩種建立方式
**固定陣列**：
\`\`\`cpp
int g[5][5] = {0};                // 全 0

**動態 vector**：

for (int i = 0; i < n; i++)
    for (int j = 0; j < m; j++)
        cout << g[i][j] << " ";

## 8.3 常見模式：棋盤格
\`\`\`cpp
for (int i = 0; i < n; i++)
    for (int j = 0; j < n; j++)
        g[i][j] = (i + j) % 2;

# 第 8 章：二維陣列 (C)

## 8.1 宣告
\`\`\`c
int g[5][5] = {0};
int g[3][3] = {{1,2,3},{4,5,6},{7,8,9}};
\`\`\`

## 8.2 走訪
\`\`\`c
for (int i = 0; i < n; i++) {
    for (int j = 0; j < m; j++)
        printf("%d ", g[i][j]);
    printf("\\n");
}
\`\`\`

## 8.3 動態二維陣列
要兩階段 malloc：

# 第 14 章：qsort 進階 (C)

## 14.1 自訂 cmp
\`\`\`c
typedef struct { char name[20]; int score, age; } S;

int cmp(const void* a, const void* b) {
    const S* x = a; const S* y = b;
    if (x->score != y->score) return y->score - x->score;  // 分數降冪
    return x->age - y->age;                                 // 年齡升冪
}

S arr[100];
qsort(arr, n, sizeof(S), cmp);
\`\`\`

## 14.2 cmp 回傳值的含意
- 回傳 **負數**：a 排在 b **前面**
- 回傳 **正數**：a 排在 b **後面**
- 回傳 **0**：順序不變

## 14.3 注意：用減法可能溢位
\`\`\`c
// 危險：a - b 可能溢位
int cmp(const void* a, const void* b) {
    return *(int*)a - *(int*)b;  // 兩個都是大負數時會錯
}

// 安全寫法
int cmp(const void* a, const void* b) {
    int x = *(int*)a, y = *(int*)b;
    return (x > y) - (x < y);
}
\`\`\`

# 第 15 章：遞迴入門 (C++)

## 15.1 階乘
\`\`\`cpp
int fact(int n) {
    if (n <= 1) return 1;          // base case
    return n * fact(n - 1);        // recurse
}
\`\`\`

## 15.2 費氏數列
\`\`\`cpp
int fib(int n) {
    if (n <= 1) return n;
    return fib(n-1) + fib(n-2);
}
// 注意：fib(40) 已經很慢，要記憶化
\`\`\`

## 15.3 N 皇后回溯
\`\`\`cpp
int N, cnt;
void solve(int row, int cols, int d1, int d2) {
    if (row == N) { cnt++; return; }
    for (int c = 0; c < N; c++) {
        int cb = 1 << c, d1b = 1 << (row-c+N), d2b = 1 << (row+c);
        if (cols & cb || d1 & d1b || d2 & d2b) continue;
        solve(row+1, cols|cb, d1|d1b, d2|d2b);
    }
}

\`\`\`c

    hanoi(n-1, from, via, to);

    hanoi(n-1, via, to, from);
}

> 2. 縮小問題後呼叫自己
> 3. 合併子結果

# 第 15 章：遞迴入門 (Java)

## 15.1 階乘
\`\`\`java
static int fact(int n) {
    if (n <= 1) return 1;
    return n * fact(n - 1);
}
\`\`\`

## 15.2 費氏（記憶化版）
\`\`\`java
static int[] memo = new int[100];
static int fib(int n) {
    if (n <= 1) return n;
    if (memo[n] != 0) return memo[n];
    return memo[n] = fib(n-1) + fib(n-2);
}
\`\`\`

## 15.3 N 皇后
\`\`\`java
static int N, cnt;
static void solve(int row, int cols, int d1, int d2) {
    if (row == N) { cnt++; return; }
    for (int c = 0; c < N; c++) {
        int cb = 1 << c, d1b = 1 << (row-c+N), d2b = 1 << (row+c);
        if ((cols & cb) != 0 || (d1 & d1b) != 0 || (d2 & d2b) != 0) continue;
        solve(row+1, cols|cb, d1|d1b, d2|d2b);
    }
}
\`\`\`

> **Java 遞迴深度**：預設 JVM 堆疊 512KB，約 10000 層。

- \`__builtin_popcount(mask)\` — 算 1 的個數（GCC）

## 16.3 雙層枚舉
\`\`\`c
for (int i = 0; i < n; i++)
    for (int j = i+1; j < n; j++)
        if (a[i] + a[j] == target) cnt++;

# 第 19 章：綜合練習 — Kadane (C)

## 19.1 最大連續子陣列和
\`\`\`c
int a[] = {-2, 1, -3, 4, -1, 2, 1, -5, 4};
int n = 9;
int cur = a[0], best = a[0];
for (int i = 1; i < n; i++) {
    cur = (a[i] > cur + a[i]) ? a[i] : cur + a[i];
    if (cur > best) best = cur;
}
printf("%d\\n", best);
\`\`\`

## 19.2 全負陣列要注意
題目通常規定「至少選一個」，所以初始 \`cur = best = a[0]\` 而非 0。

## 19.3 時間複雜度
O(n) — 只跑一次陣列。

> **Kadane 的精神**：每一格決定「從這裡重新開始」還是「延續前面的」。永遠記得目前最佳的 \`best\`。
`,
java:`
# 第 19 章：綜合練習 — Kadane (Java)

## 19.1 最大連續子陣列和
\`\`\`java
int[] a = {-2, 1, -3, 4, -1, 2, 1, -5, 4};
int cur = a[0], best = a[0];
for (int i = 1; i < a.length; i++) {
    cur = Math.max(a[i], cur + a[i]);
    best = Math.max(best, cur);
}
System.out.println(best);
\`\`\`

## 19.2 為什麼這樣對？
**DP 思路**：\`dp[i]\` = 以 i 結尾的最大連續和。
- 要嘛只取 \`a[i]\`（前面全丟）
- 要嘛接上 \`dp[i-1] + a[i]\`

取較大的，然後追蹤全局最大。

## 19.3 變形題
- 二維 Kadane（最大子矩陣和）— 列上跑 Kadane + 外層枚舉行區間，O(n³)
- 不超過 K 個元素的最大和 — 滑動視窗

# 第 21 章：樹的走訪 (C++)

樹是沒有環的連通圖。APCS 常見考法是「父子關係、走訪順序、子樹大小」。

## 21.1 存樹
\`\`\`cpp
vector<vector<int>> child(n);  // child[u] 存 u 的所有孩子
child[0] = {1, 2};
child[1] = {3, 4};
\`\`\`

若題目給的是無向邊，就用鄰接表再帶 parent 避免走回去。

## 21.2 DFS 算子樹大小
\`\`\`cpp
vector<int> sz(n, 1);
int dfs(int u) {
    for (int v : child[u])
        sz[u] += dfs(v);
    return sz[u];
}
\`\`\`

## 21.3 前序 / 後序
- 前序：先處理自己，再處理孩子。
- 後序：先處理孩子，再回來整理自己。

子樹大小、樹 DP 多半是後序，因為你要先知道孩子的答案。
`,

# 第 21 章：樹的走訪 (C)

C 沒有 vector，APCS 小樹可以用固定陣列存孩子。

## 21.1 固定陣列版 children
\`\`\`c
int child[100][100], cnt[100] = {0};
child[0][cnt[0]++] = 1;
child[0][cnt[0]++] = 2;
child[1][cnt[1]++] = 3;
child[1][cnt[1]++] = 4;
\`\`\`

## 21.2 DFS 算子樹大小
\`\`\`c
int sz[100];
int dfs(int u) {
    sz[u] = 1;
    for (int i = 0; i < cnt[u]; i++) {
        int v = child[u][i];
        sz[u] += dfs(v);
    }
    return sz[u];
}
\`\`\`

## 21.3 C 的重點
- 陣列大小要開夠。
- 遞迴深度太深可能 stack overflow。
- 如果是無向樹，DFS 參數要加 parent。

static ArrayList<Integer>[] child;
static int[] sz;

static int dfs(int u) {
    sz[u] = 1;
    for (int v : child[u]) sz[u] += dfs(v);
    return sz[u];
}

## 21.3 實戰提醒
節點很多時，Java 遞迴可能爆 stack；若深度可能到 10^5，就改成迭代 stack 或調 JVM stack。

# 第 22 章：圖論 BFS / DFS (C++)

圖用鄰接表存，BFS 求等權最短距離，DFS 找連通分量。

## 22.1 鄰接表
\`\`\`cpp
vector<vector<int>> g(n);
g[u].push_back(v);
g[v].push_back(u);  // 無向圖要加兩邊
\`\`\`

## 22.2 BFS 最短步數
\`\`\`cpp
vector<int> dist(n, -1);
queue<int> q;
dist[s] = 0;
q.push(s);
while (!q.empty()) {
    int u = q.front(); q.pop();
    for (int v : g[u]) if (dist[v] == -1) {
        dist[v] = dist[u] + 1;
        q.push(v);
    }
}
\`\`\`

## 22.3 DFS 連通分量
\`\`\`cpp
void dfs(int u) {
    vis[u] = true;
    for (int v : g[u]) if (!vis[v]) dfs(v);
}

# 第 22 章：圖論 BFS / DFS (C)

C 可以用「邊表 + head」存鄰接表，也可以在小圖用二維陣列。這裡先用固定陣列版。

## 22.1 固定陣列鄰接表
\`\`\`c

g[v][deg[v]++] = u;

\`\`\`c

# 第 23 章：最短路徑與拓樸 (C++)

有權非負圖用 Dijkstra，DAG 順序問題用拓樸排序。

## 23.1 Dijkstra
\`\`\`cpp
vector<vector<pair<int,int>>> g(n);  // (to, weight)
priority_queue<pair<int,int>, vector<pair<int,int>>, greater<pair<int,int>>> pq;
vector<int> dist(n, INF);
dist[s] = 0;
pq.push({0, s});
while (!pq.empty()) {
    auto [d, u] = pq.top(); pq.pop();
    if (d != dist[u]) continue;
    for (auto [v, w] : g[u]) {
        if (d + w < dist[v]) {
            dist[v] = d + w;
            pq.push({dist[v], v});
        }
    }
}
\`\`\`

## 23.2 拓樸排序
\`\`\`cpp
queue<int> q;
for (int i = 0; i < n; i++) if (indeg[i] == 0) q.push(i);
while (!q.empty()) {
    int u = q.front(); q.pop();
    order.push_back(u);
    for (int v : g[u]) if (--indeg[v] == 0) q.push(v);
}
\`\`\`

# 第 23 章：最短路徑與拓樸 (C)

C 沒有內建 heap；若圖不大，可以先用 O(n²) Dijkstra。APCS 初學階段先掌握概念最重要。

## 23.1 O(n²) Dijkstra
\`\`\`c
for (int i = 0; i < n; i++) dist[i] = INF;
dist[s] = 0;
for (int step = 0; step < n; step++) {
    int u = -1;
    for (int i = 0; i < n; i++)
        if (!used[i] && (u == -1 || dist[i] < dist[u])) u = i;
    used[u] = 1;
    for (int v = 0; v < n; v++)
        if (w[u][v] < INF && dist[u] + w[u][v] < dist[v])
            dist[v] = dist[u] + w[u][v];
}
\`\`\`

Java 的 \`PriorityQueue\` 很適合寫 Dijkstra。

## 23.1 Dijkstra

PriorityQueue<int[]> pq = new PriorityQueue<>((a,b) -> a[0] - b[0]);

# 第 24 章：進階 DP (C++)

DP 的重點是狀態、轉移、計算順序。

## 24.1 LIS O(n²)
\`\`\`cpp
vector<int> dp(n, 1);
for (int i = 0; i < n; i++)
    for (int j = 0; j < i; j++)
        if (a[j] < a[i]) dp[i] = max(dp[i], dp[j] + 1);
\`\`\`

## 24.2 0/1 背包
\`\`\`cpp
vector<int> dp(W+1, 0);
for (int i = 0; i < n; i++)
    for (int j = W; j >= w[i]; j--)
        dp[j] = max(dp[j], dp[j-w[i]] + val[i]);
\`\`\`

內層倒序代表每個物品只能用一次。

## 24.3 LCS
\`\`\`cpp
vector<vector<int>> dp(m+1, vector<int>(n+1));
for (int i = 1; i <= m; i++)
    for (int j = 1; j <= n; j++)
        if (a[i-1] == b[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
        else dp[i][j] = max(dp[i-1][j], dp[i][j-1]);
\`\`\`
`,

# 第 24 章：進階 DP (C)

    for (int j = 0; j < i; j++)

        if (dp[j-w[i]] + val[i] > dp[j])
            dp[j] = dp[j-w[i]] + val[i];

    for (int j = 1; j <= n; j++)

# 第 25 章：Union-Find 並查集 (C++)

並查集維護「誰和誰在同一群」，核心是 \`find\` 與 \`unite\`。

## 25.1 路徑壓縮
\`\`\`cpp
vector<int> parent(n);
iota(parent.begin(), parent.end(), 0);

int find(int x) {
    if (parent[x] == x) return x;
    return parent[x] = find(parent[x]);
}
\`\`\`

## 25.2 合併
\`\`\`cpp
bool unite(int a, int b) {
    int ra = find(a), rb = find(b);
    if (ra == rb) return false;
    parent[ra] = rb;
    return true;
}
\`\`\`

算連通分量時，把所有邊 unite 後統計不同 root。
`,

# 第 25 章：Union-Find 並查集 (C)

C 版直接用陣列存 parent。

## 25.1 find
\`\`\`c
int parent[1000];
int find(int x) {
    if (parent[x] == x) return x;
    return parent[x] = find(parent[x]);
}

## 25.2 union
\`\`\`c
int unite(int a, int b) {
    int ra = find(a), rb = find(b);
    if (ra == rb) return 0;
    parent[ra] = rb;
    return 1;
}

for (int i = 0; i < n; i++) parent[i] = i;

java:`
# 第 25 章：Union-Find 並查集 (Java)

Java 通常包成一個 DSU class，之後題目直接複製模板。

## 25.1 DSU class
\`\`\`java
static class DSU {
    int[] parent;
    DSU(int n) {
        parent = new int[n];
        for (int i = 0; i < n; i++) parent[i] = i;
    }
    int find(int x) {
        if (parent[x] == x) return x;
        return parent[x] = find(parent[x]);
    }
    boolean unite(int a, int b) {
        int ra = find(a), rb = find(b);
        if (ra == rb) return false;
        parent[ra] = rb;
        return true;
    }
}
\`\`\`
`

# 第 26 章：字串 hash 與 Trie (C++)

字串題常見三種工具：hash 快速比對、KMP 找模式、Trie 做前綴查詢。

## 26.1 Rolling hash
\`\`\`cpp
const long long MOD = 1000000007, BASE = 911382323;
vector<long long> h(n+1), p(n+1, 1);
for (int i = 0; i < n; i++) {
    h[i+1] = (h[i] * BASE + s[i]) % MOD;
    p[i+1] = p[i] * BASE % MOD;
}
auto get = [&](int l, int r) {
    return (h[r] - h[l] * p[r-l] % MOD + MOD) % MOD;
};
\`\`\`

## 26.2 Trie
\`\`\`cpp
struct Node { int nxt[26]; bool end = false; Node(){ memset(nxt, -1, sizeof(nxt)); } };
vector<Node> trie(1);
\`\`\`

Trie 適合「大量字串前綴」問題，例如字典、電話號碼、starts_with。
`,

c:`/* C 沒有原生 dict/set。\n * 此範例用「平行陣列」做簡單計數。 */\n#include <stdio.h>\n#include <string.h>\nint main(){\n    char* words[] = {"the","quick","brown","fox","jumps","over","the","lazy","dog","the","fox"};\n    int n = 11;\n    char keys[20][20] = {0};\n    int vals[20] = {0}, k = 0;\n    for (int i = 0; i < n; i++) {\n        int found = 0;\n        for (int j = 0; j < k; j++)\n            if (strcmp(keys[j], words[i]) == 0) { vals[j]++; found = 1; break; }\n        if (!found) { strcpy(keys[k], words[i]); vals[k] = 1; k++; }\n    }\n    printf("字頻:\\n");\n    for (int i = 0; i < k; i++) printf("  %s: %d\\n", keys[i], vals[i]);\n    printf("不同字數: %d\\n", k);\n    return 0;\n}`,

cpp:`#include <iostream>\n#include <vector>\n#include <tuple>\n#include <string>\n#include <algorithm>\nusing namespace std;\nint main(){\n    vector<tuple<string,int,int>> students = {\n        {"Alice", 85, 17},\n        {"Bob",   92, 16},\n        {"Cara",  85, 18},\n        {"Dan",   92, 15}\n    };\n    // 分數降冪，分數同則年齡升冪\n    sort(students.begin(), students.end(), [](const auto& a, const auto& b){\n        if (get<1>(a) != get<1>(b)) return get<1>(a) > get<1>(b);\n        return get<2>(a) < get<2>(b);\n    });\n    for (auto& s : students)\n        cout << get<0>(s) << ": 分數=" << get<1>(s) << ", 年齡=" << get<2>(s) << "\\n";\n    return 0;\n}`,
c:`#include <stdio.h>\n#include <stdlib.h>\n#include <string.h>\ntypedef struct { char name[20]; int score, age; } S;\nint cmp(const void* a, const void* b){\n    const S* x = (const S*)a;\n    const S* y = (const S*)b;\n    if (x->score != y->score) return y->score - x->score;  /* 分數降冪 */\n    return x->age - y->age;                                  /* 年齡升冪 */\n}\nint main(){\n    S st[] = {{"Alice",85,17},{"Bob",92,16},{"Cara",85,18},{"Dan",92,15}};\n    int n = 4;\n    qsort(st, n, sizeof(S), cmp);\n    for (int i = 0; i < n; i++)\n        printf("%s: 分數=%d, 年齡=%d\\n", st[i].name, st[i].score, st[i].age);\n    return 0;\n}`,
java:`import java.util.*;\npublic class Main {\n    public static void main(String[] args) {\n        int[][] students = {{0,85,17},{1,92,16},{2,85,18},{3,92,15}};\n        String[] names = {"Alice","Bob","Cara","Dan"};\n        // 分數降冪，分數同則年齡升冪\n        Arrays.sort(students, (a, b) -> {\n            if (a[1] != b[1]) return b[1] - a[1];\n            return a[2] - b[2];\n        });\n        for (int[] s : students)\n            System.out.printf("%s: 分數=%d, 年齡=%d%n", names[s[0]], s[1], s[2]);\n    }\n}`

cpp:`#include <iostream>\nusing namespace std;\nint N, cnt;\nvoid solve(int row, int cols, int d1, int d2){\n    if (row == N) { cnt++; return; }\n    for (int c = 0; c < N; c++) {\n        int cb = 1 << c;\n        int d1b = 1 << (row - c + N);\n        int d2b = 1 << (row + c);\n        if ((cols & cb) || (d1 & d1b) || (d2 & d2b)) continue;\n        solve(row + 1, cols | cb, d1 | d1b, d2 | d2b);\n    }\n}\nint main(){\n    for (N = 4; N <= 8; N++) {\n        cnt = 0;\n        solve(0, 0, 0, 0);\n        cout << N << " 皇后有 " << cnt << " 種放法\\n";\n    }\n    return 0;\n}`,
c:`#include <stdio.h>\nint N, cnt;\nvoid solve(int row, int cols, int d1, int d2){\n    if (row == N) { cnt++; return; }\n    for (int c = 0; c < N; c++) {\n        int cb = 1 << c;\n        int d1b = 1 << (row - c + N);\n        int d2b = 1 << (row + c);\n        if ((cols & cb) || (d1 & d1b) || (d2 & d2b)) continue;\n        solve(row + 1, cols | cb, d1 | d1b, d2 | d2b);\n    }\n}\nint main(){\n    for (N = 4; N <= 8; N++) {\n        cnt = 0;\n        solve(0, 0, 0, 0);\n        printf("%d 皇后有 %d 種放法\\n", N, cnt);\n    }\n    return 0;\n}`,
java:`public class Main {\n    static int N, cnt;\n    static void solve(int row, int cols, int d1, int d2) {\n        if (row == N) { cnt++; return; }\n        for (int c = 0; c < N; c++) {\n            int cb = 1 << c;\n            int d1b = 1 << (row - c + N);\n            int d2b = 1 << (row + c);\n            if ((cols & cb) != 0 || (d1 & d1b) != 0 || (d2 & d2b) != 0) continue;\n            solve(row + 1, cols | cb, d1 | d1b, d2 | d2b);\n        }\n    }\n    public static void main(String[] args) {\n        for (N = 4; N <= 8; N++) {\n            cnt = 0;\n            solve(0, 0, 0, 0);\n            System.out.println(N + " 皇后有 " + cnt + " 種放法");\n        }\n    }\n}`

cpp:`#include <iostream>\n#include <queue>\n#include <vector>\n#include <map>\n#include <string>\n#include <sstream>\nusing namespace std;\nint main(){\n    vector<int> nums = {3, 1, 4, 1, 5, 9, 2, 6, 5, 3, 5};\n    // 前 3 小：用小堆\n    priority_queue<int, vector<int>, greater<int>> minH(nums.begin(), nums.end());\n    cout << "前 3 小: ";\n    for (int i = 0; i < 3; i++) { cout << minH.top() << " "; minH.pop(); }\n    cout << "\\n";\n    // 字頻 + Top 2\n    string s = "the quick brown fox jumps over the lazy dog";\n    map<string,int> cnt;\n    stringstream ss(s);\n    string w;\n    while (ss >> w) cnt[w]++;\n    cout << "不同字數: " << cnt.size() << "\\n";\n    return 0;\n}`,
c:`/* C 沒有 priority_queue，用 sort + 取前 K 個 */\n#include <stdio.h>\n#include <stdlib.h>\nint cmp(const void* a, const void* b){return *(int*)a - *(int*)b;}\nint main(){\n    int nums[] = {3, 1, 4, 1, 5, 9, 2, 6, 5, 3, 5};\n    int n = 11;\n    int sorted[20];\n    for (int i = 0; i < n; i++) sorted[i] = nums[i];\n    qsort(sorted, n, sizeof(int), cmp);\n    printf("前 3 小: ");\n    for (int i = 0; i < 3; i++) printf("%d ", sorted[i]);\n    printf("\\n前 3 大: ");\n    for (int i = n-1; i >= n-3; i--) printf("%d ", sorted[i]);\n    printf("\\n");\n    return 0;\n}`,
java:`import java.util.*;\npublic class Main {\n    public static void main(String[] args) {\n        int[] nums = {3, 1, 4, 1, 5, 9, 2, 6, 5, 3, 5};\n        // 前 3 大用 PriorityQueue\n        PriorityQueue<Integer> minH = new PriorityQueue<>();\n        for (int x : nums) { minH.offer(x); if (minH.size() > 3) minH.poll(); }\n        System.out.println("前 3 大: " + new ArrayList<>(minH));\n        // 字頻\n        String s = "the quick brown fox jumps over the lazy dog";\n        Map<String,Integer> cnt = new HashMap<>();\n        for (String w : s.split(" ")) cnt.merge(w, 1, Integer::sum);\n        System.out.println("不同字數: " + cnt.size());\n    }\n}`
