function chapSection(id){
  if(id <= 26) return {key:'apcs', label:'📘 APCS 考試準備', desc:'語法 → 演算法 → 競賽題型'};
  if(id <= 31) return {key:'practical', label:'🛠 實用程式', desc:'檔案、模組、OOP、測試 — 寫工具的基本功'};
  if(id <= 35) return {key:'project', label:'🚀 製作專案', desc:'CLI / CSV / API / 遊戲，整合練習'};
  if(id <= 43) return {key:'topic-crawl', label:'🕷 專項教學 · 爬蟲', desc:'HTTP、requests、BeautifulSoup、實戰爬取'};
  if(id <= 51) return {key:'topic-data',  label:'📊 專項教學 · 資料分析', desc:'pandas、清理、groupby、視覺化'};
  if(id <= 59) return {key:'topic-bot',   label:'🤖 專項教學 · Bot', desc:'Discord / LINE、事件、指令、部署'};
  if(id <= 67) return {key:'topic-game', label:'🎮 專項教學 · pygame', desc:'game loop、輸入、碰撞、完整小遊戲'};
  if(id === 68) return {key:'apcs-new', label:'📗 APCS 新制與識讀', desc:'四級題本、題目分級、程式追蹤'};
  return {key:'advanced-practice', label:'🔥 高級題訓練', desc:'快速冪、模運算、分治與逆序對'};
}
function renderChapList() {
  const list = document.getElementById('chap-list');
  list.innerHTML = '';
  let lastSection = null;
  CHAPTERS.forEach(c => {
    const sec = chapSection(c.id);
    if(sec.key !== lastSection){
      const header = document.createElement('div');
      header.className = 'sec-header';
      header.innerHTML = `<div class="sec-label">${sec.label}</div><div class="sec-desc">${sec.desc}</div>`;
      list.appendChild(header);
      lastSection = sec.key;
    }
    const div = document.createElement('div');
    const done = completed.has(c.id);
    div.className = 'chap' + (done ? ' done' : '');
    div.onclick = () => selectChap(c.id);
    div.id = 'chap-' + c.id;
    div.innerHTML = `<div class="chap-num">第 ${c.id} 章 · ${c.tag}</div><div class="chap-title">${c.title}</div>`;
    list.appendChild(div);
  });
}

let _prevChapId = null;
function selectChap(id, opts) {
  opts = opts || {};
  currentChap = CHAPTERS.find(c => c.id === id);
  if(!currentChap) return;
  const body = document.getElementById('lesson-body');
  const prevScroll = body.scrollTop;
  document.querySelectorAll('.chap').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('chap-' + id);
  if(el) el.classList.add('active');
  document.getElementById('lesson-title').textContent = `第 ${currentChap.id} 章：${currentChap.title}`;
  document.getElementById('lesson-tag').textContent = currentChap.tag;
  body.innerHTML = marked.parse(getContent(currentChap)) + renderMeta(currentChap);
  if(!opts.preserveEditor){
    cm.setValue(getExample(currentChap));
    document.getElementById('stdin-input').value = getStdin(currentChap);
    document.getElementById('output-body').textContent = '點擊上方「執行」測試程式';
  }
  // 只有切換到新章節才滾回頂端；同章節重繪（例如答完題）保留位置
  if(_prevChapId === id && !opts.forceTop){
    body.scrollTop = prevScroll;
  } else {
    body.scrollTop = 0;
  }
  _prevChapId = id;
}

function clearEditor() { cm.setValue(''); }

function copyCode() {
  const code = cm.getValue();
  if (!code) return;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) {
      const originalText = btn.innerHTML;
      btn.innerHTML = '📋 已複製';
      setTimeout(() => btn.innerHTML = originalText, 2000);
    }
  }).catch(err => {
    console.error('複製失敗:', err);
  });
}
function resetExample() {
  if (currentChap) {
    cm.setValue(getExample(currentChap));
    document.getElementById('stdin-input').value = getStdin(currentChap);
  }
}

async function executeCode(code, stdin, lang) {
  // returns {raw: full output text, stderr: boolean}
  if (lang === 'py') {
    if (!pyodide) return {raw:'Pyodide 尚未載入', stderr:true};
    pyodide.globals.set('__user_stdin', stdin);
    pyodide.globals.set('__user_code', code);
    await pyodide.runPythonAsync(`
import sys, io, traceback
__buf = io.StringIO()
__old_in, __old_out, __old_err = sys.stdin, sys.stdout, sys.stderr
sys.stdin = io.StringIO(__user_stdin)
sys.stdout = __buf
sys.stderr = __buf
try:
    exec(__user_code, {'__name__': '__main__'})
except SystemExit:
    pass
except BaseException:
    traceback.print_exc(file=__buf)
finally:
    sys.stdin, sys.stdout, sys.stderr = __old_in, __old_out, __old_err
__result = __buf.getvalue()
`);
    const result = pyodide.globals.get('__result') || '';
    return {raw: result, stderr: /Traceback|Error/.test(result)};
  }
  // C / C++ / Java 走 Judge0 CE（Piston 公開 API 自 2026/02/15 起改白名單）
  const JUDGE0_LANG = { cpp: 54, c: 50, java: 62 };
  const filename = lang === 'java' ? 'Main.java' : (lang === 'cpp' ? 'main.cpp' : 'main.c');
  try {
    const res = await fetch('https://ce.judge0.com/submissions?base64_encoded=false&wait=true', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        language_id: JUDGE0_LANG[lang],
        source_code: code,
        stdin: stdin || ''
      })
    });
    const data = await res.json();
    const stdout = data.stdout || '';
    const stderr = data.stderr || data.compile_output || '';
    return {raw: stdout + (stderr ? '\n[stderr]\n' + stderr : ''), stderr: !!stderr};
  } catch (e) {
    return {raw: '網路錯誤（C/C++/Java 透過 Judge0 CE 編譯執行，需要網路）：\n' + String(e.message || e), stderr: true};
  }
}

async function runCode() {
  const code = cm.getValue();
  const stdin = document.getElementById('stdin-input').value;
  const out = document.getElementById('output-body');
  out.textContent = '執行中...';
  try {
    const {raw} = await executeCode(code, stdin, currentLang);
    const result = raw || '(無輸出)';
    const hint = currentLang === 'py' ? translateError(result) : '';
    if(hint){
      out.innerHTML = '';
      const pre = document.createElement('div');
      pre.textContent = result;
      out.appendChild(pre);
      const hintDiv = document.createElement('div');
      hintDiv.innerHTML = hint;
      out.appendChild(hintDiv);
    } else {
      out.textContent = result;
    }
  } catch (e) {
    out.textContent = '錯誤：\n' + (e.message || e);
  }
}

// ── 程式練習：執行使用者程式碼，比對 stdout 是否符合預期 ───────────────
function normalizeOutput(s){
  return (s || '').replace(/\r\n/g,'\n').replace(/[ \t]+\n/g,'\n').replace(/\n+$/,'').trim();
}
async function checkAnswer(chapId){
  const meta = CHAPTER_META[chapId];
  if(!meta || !meta.code) return;
  const btn = document.getElementById('check-btn-'+chapId);
  if(btn){ btn.disabled = true; btn.textContent = '執行中...'; }
  const code = cm.getValue();
  let result;
  try {
    result = await executeCode(code, meta.code.stdin || '', currentLang);
  } catch(e){
    result = {raw: String(e.message||e), stderr: true};
  }
  const got = normalizeOutput(result.raw);
  const want = normalizeOutput(meta.code.expect);
  const passed = !result.stderr && got === want;
  codeQuizState[chapId] = {status: passed ? 'pass' : 'fail', got: result.raw || '(無輸出)'};
  if(passed && !completed.has(chapId)) markDone(chapId);
  if(currentChap && currentChap.id === chapId) selectChap(chapId, {preserveEditor:true});
}
