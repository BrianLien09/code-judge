<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Judge — 教師後台管理</title>

<!-- CodeMirror（解答編輯器用） -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>

<!-- 括號與引號自動補全、匹配 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>

<style>
/* ── Design tokens（與主系統共用色盤） ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117;
  --sidebar-bg: #161b22;
  --panel-bg: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #79c0ff;
  --purple: #bc8cff;
  --accent: #58a6ff;
  --header-h: 56px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── Header ── */
header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 20px;
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.logo { font-size: 17px; font-weight: 700; color: var(--accent); }
.sub  { font-size: 12px; color: var(--text-muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.back-link {
  font-size: 12px; color: var(--text-muted); text-decoration: none;
  padding: 5px 10px; border: 1px solid var(--border); border-radius: 5px;
  transition: all .15s;
}
.back-link:hover { color: var(--text); border-color: var(--text-muted); }

/* ── Toast 通知 ── */
#toast-container {
  position: fixed; top: 70px; right: 20px; z-index: 999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 16px; border-radius: 8px; font-size: 13px;
  border: 1px solid; min-width: 200px;
  animation: slideIn .2s ease;
  backdrop-filter: blur(10px);
}
.toast.success { background: rgba(63,185,80,.15); border-color: rgba(63,185,80,.4); color: var(--green); }
.toast.error   { background: rgba(248,81,73,.15);  border-color: rgba(248,81,73,.4);  color: var(--red);   }
.toast.info    { background: rgba(88,166,255,.15); border-color: rgba(88,166,255,.4); color: var(--blue);  }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── 主版面：sidebar + main ── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - var(--header-h));
  overflow: hidden;
}

/* ── 左側 Sidebar ── */
.sidebar {
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.search-box {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  transition: border-color .15s;
}
.search-box:focus { border-color: var(--accent); }
.filter-row { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-btn {
  padding: 3px 8px; border-radius: 10px; font-size: 11px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text-muted);
  transition: all .15s;
}
.filter-btn:hover { color: var(--text); }
.filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(88,166,255,.1); }

.add-btn {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px dashed rgba(63,185,80,.5);
  background: rgba(63,185,80,.05);
  color: var(--green);
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
  transition: all .15s;
}
.add-btn:hover { background: rgba(63,185,80,.12); border-style: solid; }

/* 題目列表 */
.problem-list {
  overflow-y: auto;
  flex: 1;
  padding: 8px 0;
}
.list-item {
  padding: 9px 14px;
  cursor: pointer;
  border-bottom: 1px solid rgba(48,54,61,.4);
  border-left: 3px solid transparent;
  transition: background .1s, border-color .1s;
}
.list-item:hover { background: rgba(255,255,255,.03); }
.list-item.active { background: rgba(88,166,255,.06); border-left-color: var(--accent); }
.list-meta { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.list-title { font-size: 13px; font-weight: 600; color: var(--text); }
.diff-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.diff-dot.easy    { background: var(--green); }
.diff-dot.medium  { background: var(--yellow); }
.diff-dot.midhigh { background: var(--purple); }
.diff-dot.hard    { background: var(--red); }
.list-count { font-size: 11px; color: var(--text-muted); padding: 16px; text-align: center; }

/* ── 右側主面板 ── */
.main-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 空白狀態 */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 52px; }
.empty-state p { font-size: 14px; }

/* ── 編輯器容器 ── */
.editor-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 工具列 */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel-bg);
  flex-shrink: 0;
}
.toolbar-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-right: 4px;
}
.toolbar-id {
  font-size: 11px;
  color: var(--text-muted);
  padding: 2px 8px;
  background: rgba(255,255,255,.05);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.toolbar-spacer { flex: 1; }
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: none; transition: all .15s;
}
.btn-save { background: var(--accent); color: #000; }
.btn-save:hover { filter: brightness(1.1); }
.btn-delete { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
.btn-delete:hover { background: rgba(248,81,73,.25); }
.btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-outline:hover { color: var(--text); border-color: var(--text-muted); }

/* ── 編輯器大 Tab ── */
.tab-nav {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--panel-bg);
  flex-shrink: 0;
}
.tab-btn {
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  font-weight: 500;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px; }
.tab-content.active { display: flex; flex-direction: column; gap: 16px; }

/* ── 表單元件 ── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group.full { grid-column: 1 / -1; }
label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}
input[type="text"], input[type="url"], select, textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition: border-color .15s;
  font-family: inherit;
  width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
select option { background: var(--panel-bg); }
textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}
textarea.mono {
  font-family: 'SFMono-Regular', Consolas, monospace;
  font-size: 12px;
  min-height: 120px;
}

/* ── 難度選擇器 ── */
.diff-select {
  display: flex;
  gap: 6px;
}
.diff-opt {
  flex: 1;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.diff-opt[data-diff="easy"].selected    { border-color: var(--green);  background: rgba(63,185,80,.12);  color: var(--green);  }
.diff-opt[data-diff="medium"].selected  { border-color: var(--yellow); background: rgba(210,153,34,.12); color: var(--yellow); }
.diff-opt[data-diff="midhigh"].selected { border-color: var(--purple); background: rgba(188,140,255,.12);color: var(--purple); }
.diff-opt[data-diff="hard"].selected    { border-color: var(--red);    background: rgba(248,81,73,.12);  color: var(--red);    }

/* ── 測資區塊 ── */
.section-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.btn-sm {
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  transition: all .15s;
}
.btn-sm:hover { color: var(--text); border-color: var(--text-muted); }
.btn-sm.danger:hover { color: var(--red); border-color: rgba(248,81,73,.5); }

.sample-block {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 10px;
  background: var(--panel-bg);
}
.sample-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(255,255,255,.02);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
}
.sample-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.sample-col { padding: 10px 12px; }
.sample-col + .sample-col { border-left: 1px solid var(--border); }
.sample-col label { display: block; margin-bottom: 4px; }
.sample-col textarea {
  min-height: 70px;
  font-family: 'SFMono-Regular', Consolas, monospace;
  font-size: 12px;
}

/* ── 解答 Tab（語言切換） ── */
.lang-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  padding: 0 0 0 4px;
  flex-shrink: 0;
}
.lang-tab {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.lang-tab:hover { color: var(--text); }
.lang-tab.active.py   { color: #3fb950; border-color: #3fb950; }
.lang-tab.active.cpp  { color: #79c0ff; border-color: #79c0ff; }
.lang-tab.active.c    { color: #ffa657; border-color: #ffa657; }
.lang-tab.active.java { color: #d2a8ff; border-color: #d2a8ff; }

.sol-editor-wrap {
  flex: 1;
  overflow: hidden;
  min-height: 300px;
  display: flex;
  flex-direction: column;
}
.sol-editor-wrap .CodeMirror {
  flex: 1;
  height: 340px !important;
  font-size: 13px !important;
  font-family: 'SFMono-Regular', Consolas, monospace !important;
}

/* ── 確認對話框 ── */
.dialog-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.dialog-overlay.open { display: flex; }
.dialog {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 10px 40px rgba(0,0,0,.5);
}
.dialog h3 { font-size: 16px; margin-bottom: 10px; }
.dialog p  { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
.dialog-btns { display: flex; gap: 10px; justify-content: flex-end; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
/* ── Login Overlay ── */
#login-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15, 17, 23, 0.95);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10000;
  backdrop-filter: blur(10px);
}
.login-box {
  background: var(--sidebar-bg);
  padding: 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 400px;
  max-width: 90%;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  text-align: center;
}
.login-box h2 {
  margin-bottom: 8px;
  color: var(--text);
}
.login-box p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
}
.login-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  font-size: 16px;
}
.login-box button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}
.login-box button:hover {
  background: #2ea043;
}
.login-error {
  color: var(--red);
  font-size: 13px;
  margin-top: 12px;
  display: none;
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div>
    <div class="logo">📋 Code Judge — 教師後台</div>
    <div class="sub">題目與解答管理系統</div>
  </div>
  <div class="header-right">
    <span id="save-status" style="font-size:12px;color:var(--text-muted);"></span>
    <a href="./index.html" class="back-link">← 返回主系統</a>
  </div>
</header>

<!-- ── Toast 通知 ─────────────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── 刪除確認對話框 ──────────────────────────────────────────────────── -->
<div class="dialog-overlay" id="delete-dialog">
  <div class="dialog">
    <h3>⚠️ 確認刪除</h3>
    <p id="delete-msg">確定要刪除這道題目嗎？此操作需要儲存後才會寫入檔案，儲存前可以復原。</p>
    <div class="dialog-btns">
      <button class="btn btn-outline" onclick="closeDeleteDialog()">取消</button>
      <button class="btn btn-delete" onclick="confirmDelete()">確認刪除</button>
    </div>
  </div>
</div>

<!-- ── 分類管理對話框 ──────────────────────────────────────────────────── -->
<div class="dialog-overlay" id="category-dialog">
  <div class="dialog" style="max-width: 500px;">
    <h3>⚙️ 管理分類</h3>
    <p style="font-size: 12px; margin-bottom: 10px;">您可以建立最多兩層（主分類 > 子分類）的結構</p>
    <div id="category-list" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; padding: 10px; background: var(--bg);">
      <!-- categories rendered here -->
    </div>
    <div style="display:flex; gap: 8px; margin-bottom: 20px; align-items: center;">
      <input type="text" id="new-cat-name" placeholder="新分類名稱" style="flex:1;">
      <select id="new-cat-parent" style="flex:1;">
        <option value="">(無父層級 - 作為主分類)</option>
      </select>
      <button class="btn btn-save" onclick="addCategory()">＋ 新增</button>
    </div>
    <div class="dialog-btns">
      <button class="btn btn-outline" onclick="closeCategoryDialog()">關閉</button>
      <button class="btn btn-save" onclick="saveCategoriesToDisk()">💾 儲存分類</button>
    </div>
  </div>
</div>

<!-- ── 主版面 ──────────────────────────────────────────────────────────── -->
<div class="layout" style="display: none;" id="main-layout">
  
  <!-- 側邊欄 -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div style="font-size:18px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;">
        <span>📝 Code Judge 題庫後台</span>
        <button class="btn-sm danger" onclick="logout()" title="登出">登出</button>
      </div>
      <input type="text" class="search-box" id="search-input" placeholder="🔍  搜尋題目標題或 ID..." oninput="filterList()">
      <div class="filter-row" id="sidebar-filters">
        <button class="filter-btn active" data-cat="all" onclick="setFilter(this,'all')">全部</button>
      </div>
      <div style="display:flex; gap: 6px; margin-top: 4px;">
        <button class="add-btn" id="add-btn" onclick="newProblem()" style="flex: 1; padding: 6px; font-size: 0.9em;">＋ 新增</button>
        <button class="add-btn" onclick="loadData(true)" style="flex: 1; padding: 6px; border-color: var(--orange); color: var(--orange); background: rgba(255,165,0,.05); font-size: 0.9em;" title="從資料庫強制刷新">🔄 刷新</button>
        <button class="add-btn" onclick="openCategoryDialog()" style="flex: 1; padding: 6px; border-color: var(--blue); color: var(--blue); background: rgba(88,166,255,.05); font-size: 0.9em;">⚙️ 分類</button>
      </div>
    </div>
    <div class="problem-list" id="problem-list">
      <div class="list-count">載入中...</div>
    </div>
  </aside>

  <!-- 右側：主面板 -->
  <main class="main-panel" id="main-panel">
    <!-- 初始空白提示 -->
    <div class="empty-state" id="empty-state">
      <div class="icon">📝</div>
      <p>從左側選擇題目進行編輯，或點擊「＋ 新增題目」</p>
    </div>

    <!-- 編輯器（選題後顯示） -->
    <div class="editor-container" id="editor-container" style="display:none;">

      <!-- 工具列 -->
      <div class="toolbar">
        <span class="toolbar-title" id="toolbar-title">—</span>
        <span class="toolbar-id"   id="toolbar-id">—</span>
        <div class="toolbar-spacer"></div>
        <button class="btn btn-delete" onclick="deleteProblem()">🗑 刪除</button>
        <button class="btn btn-save"   onclick="saveCurrent()">💾 儲存到檔案</button>
      </div>

      <!-- Tab 導覽：題目資訊 / 參考解答 -->
      <div class="tab-nav">
        <div class="tab-btn active" onclick="switchTab('info')"  id="tab-info">題目資訊</div>
        <div class="tab-btn"        onclick="switchTab('sol')"   id="tab-sol">參考解答</div>
      </div>

      <!-- Tab 1：題目資訊 -->
      <div class="tab-content active" id="content-info">

        <!-- 基本欄位 -->
        <div class="form-grid cols-3">
          <div class="form-group">
            <label>題目 ID *</label>
            <input type="text" id="f-id" placeholder="例：my_001">
          </div>
          <div class="form-group">
            <label>標題 *</label>
            <input type="text" id="f-title" placeholder="例：最大子陣列">
          </div>
          <div class="form-group">
            <label>主題 (topic)</label>
            <input type="text" id="f-topic" placeholder="例：DP、排序">
          </div>
        </div>

        <div class="form-grid cols-3">
          <div class="form-group">
            <label>日期標籤 (date)</label>
            <input type="text" id="f-date" placeholder="例：2024/06 或 中級 ⭐⭐">
          </div>
          <div class="form-group">
            <label>來源 (source，選填)</label>
            <input type="text" id="f-source" placeholder="例：APCS、自製">
          </div>
          <div class="form-group">
            <label>原題連結 (url，選填)</label>
            <input type="url" id="f-url" placeholder="https://...">
          </div>
        </div>

        <div class="form-grid">
          <!-- 難度選擇 -->
          <div class="form-group">
            <label>難度 (保留舊屬性)</label>
            <div class="diff-select" id="diff-select">
              <div class="diff-opt" data-diff="easy"    onclick="selectDiff('easy')">📗 初級</div>
              <div class="diff-opt" data-diff="medium"  onclick="selectDiff('medium')">📙 中級</div>
              <div class="diff-opt" data-diff="midhigh" onclick="selectDiff('midhigh')">📘 中高級</div>
              <div class="diff-opt" data-diff="hard"    onclick="selectDiff('hard')">📕 高級</div>
            </div>
          </div>
          <!-- 分類選擇 -->
          <div class="form-group">
            <label>所屬分類</label>
            <select id="f-category">
              <option value="">(無)</option>
            </select>
          </div>
        </div>

        <!-- 題目說明 -->
        <div class="form-group">
          <label>題目說明 (desc) — 支援 Markdown</label>
          <textarea id="f-desc" rows="5" placeholder="題目的詳細描述，支援 **粗體**、`code`..."></textarea>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>輸入說明 (input_desc)</label>
            <textarea id="f-input-desc" rows="3" placeholder="輸入格式說明..."></textarea>
          </div>
          <div class="form-group">
            <label>輸出說明 (output_desc)</label>
            <textarea id="f-output-desc" rows="3" placeholder="輸出格式說明..."></textarea>
          </div>
        </div>

        <!-- 解題提示 -->
        <div class="form-group">
          <label>解題提示 (hint) — 支援 Markdown</label>
          <textarea id="f-hint" rows="4" placeholder="關鍵字、思路、注意事項..."></textarea>
        </div>

        <!-- 範例測資 -->
        <div>
          <div class="section-hdr">
            <span class="section-title">📋 範例測資</span>
            <button class="btn-sm" onclick="addSample()">＋ 新增測資</button>
          </div>
          <div id="samples-container"></div>
        </div>
      </div>

      <!-- Tab 2：參考解答 -->
      <div class="tab-content" id="content-sol">
        <div class="lang-tabs">
          <div class="lang-tab active py"   onclick="switchSolLang('py')"  id="sol-tab-py">🐍 Python</div>
          <div class="lang-tab cpp"          onclick="switchSolLang('cpp')" id="sol-tab-cpp">⚡ C++</div>
          <div class="lang-tab c"            onclick="switchSolLang('c')"   id="sol-tab-c">🔧 C</div>
          <div class="lang-tab java"         onclick="switchSolLang('java')" id="sol-tab-java">☕ Java</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel-bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-muted);">
          <span id="sol-lang-note">Pyodide 瀏覽器執行</span>
          <span style="margin-left:auto;"></span>
          <button class="btn-sm danger" onclick="clearSolEditor()">清空解答</button>
        </div>
        <div class="sol-editor-wrap">
          <textarea id="sol-editor-area"></textarea>
        </div>
      </div>

    </div><!-- /editor-container -->
  </main>

</div><!-- /layout -->

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h2>管理員登入</h2>
    <p>請輸入您的 Firebase 帳號密碼</p>
    <form id="login-form" onsubmit="handleLogin(event)">
      <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
      <input type="password" id="login-pwd" placeholder="Password" required autocomplete="current-password">
      <button type="submit" id="login-btn">登入</button>
      <div class="login-error" id="login-error">帳號或密碼錯誤</div>
    </form>
  </div>
</div>

<script type="module">
  import { dbService } from './js/db.js';
  window.dbService = dbService;
  window.dispatchEvent(new Event('dbReady'));
</script>

<script>
// ── 狀態 ────────────────────────────────────────────────────────────────────

/** 目前所有題目（僅存 Meta） */
let PROBLEMS = [];
/** 目前選中題目的解答集合 { py, cpp, c, java } */
let currentSolutions = { py:'', cpp:'', c:'', java:'' };
/** 目前所有分類 */
let CATEGORIES = [];
/** 目前選中的題目索引 */
let currentIdx  = null;
/** 目前解答語言 */
let currentSolLang = 'py';
/** 篩選條件 (categoryId) */
let filterCategory = 'all';
/** CodeMirror 解答編輯器實例 */
let solEditor = null;
/** 是否有未儲存變更（用於提示） */
let dirty = false;

// ── 解答語言設定 ──────────────────────────────────────────────────────────────
const LANG_CONFIG = {
  py:   { mode: 'python',        note: 'Pyodide 瀏覽器執行' },
  cpp:  { mode: 'text/x-c++src', note: '線上 g++ (Judge0)'  },
  c:    { mode: 'text/x-csrc',   note: '線上 gcc (Judge0)'  },
  java: { mode: 'text/x-java',   note: 'Judge0 CE（需網路，約3秒）' },
};

// ── 初始化 ───────────────────────────────────────────────────────────────────

window.addEventListener('dbReady', () => {
  // 監聽登入狀態
  window.dbService.onAuthStateChanged(async (user) => {
    if (user) {
      // 已登入
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('main-layout').style.display = 'grid';
      
      if (!solEditor) {
        // 初始化 CodeMirror 解答編輯器
        solEditor = CodeMirror.fromTextArea(document.getElementById('sol-editor-area'), {
          mode: 'python', theme: 'dracula', lineNumbers: true,
          indentUnit: 4, tabSize: 4, indentWithTabs: false,
          styleActiveLine: true,
          autoCloseBrackets: true,
          matchBrackets: true,
        });
        solEditor.on('change', () => { dirty = true; });
      }

      await loadData();
    } else {
      // 未登入
      document.getElementById('login-overlay').style.display = 'flex';
      document.getElementById('main-layout').style.display = 'none';
    }
  });
});

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  
  btn.disabled = true;
  btn.textContent = '登入中...';
  err.style.display = 'none';
  
  try {
    await window.dbService.login(email, pwd);
    // 登入成功後，onAuthStateChanged 會自動接管，隱藏遮罩
  } catch (error) {
    err.textContent = '登入失敗：' + error.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '登入';
  }
}

async function logout() {
  if (confirm('確定要登出嗎？')) {
    await window.dbService.logout();
  }
}

/**
 * 從 Firebase 載入題目與分類資料。
 */
async function loadData(force = false) {
  try {
    const data = await window.dbService.getMeta(force);
    PROBLEMS  = data.problemsList || [];
    CATEGORIES = data.categories || [];
    renderSidebarFilters();
    updateCategoryDropdown();
    renderList();
    toast(force ? '已強制從資料庫刷新' : '已載入題目列表', 'success');
  } catch (e) {
    toast('載入失敗，請確認 Firebase 設定', 'error');
  }
}

// ── 題目列表渲染 ─────────────────────────────────────────────────────────────

const DIFF_LABEL = { easy:'初級', medium:'中級', midhigh:'中高級', hard:'高級' };

function renderList() {
  const query = document.getElementById('search-input')?.value.toLowerCase() || '';
  const list  = document.getElementById('problem-list');

  const filtered = PROBLEMS
    .map((p, i) => ({ p, i }))
    .filter(({ p }) => {
      const pCat = p.categoryId || ('cat_' + (p.diff || 'easy'));
      if (filterCategory !== 'all') {
        const allowedCats = new Set([filterCategory]);
        CATEGORIES.forEach(c => {
          if (c.parentId === filterCategory) allowedCats.add(c.id);
        });
        if (!allowedCats.has(pCat)) return false;
      }
      if (query && !p.title.toLowerCase().includes(query) && !p.id.toLowerCase().includes(query)) return false;
      return true;
    });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="list-count">沒有符合條件的題目</div>';
    return;
  }

  list.innerHTML = filtered.map(({ p, i }) => {
    const diff  = p.diff || 'easy';
    const active = i === currentIdx ? ' active' : '';
    return `<div class="list-item${active}" onclick="selectProblem(${i})" id="list-item-${i}">
      <div class="list-meta">
        <span class="diff-dot ${diff}"></span>
        <span>${escH(p.id)}</span>
        <span style="margin-left:auto;">${DIFF_LABEL[diff] || diff}</span>
      </div>
      <div class="list-title">${escH(p.title)}</div>
    </div>`;
  }).join('');
}

function filterList() { renderList(); }

function setFilter(btn, catId) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCategory = catId;
  renderList();
}

// ── 選題 ─────────────────────────────────────────────────────────────────────

async function selectProblem(idx) {
  if (dirty && !confirm('有未儲存的變更，確定要切換嗎？')) return;

  const pMeta = PROBLEMS[idx];
  const pDetails = await window.dbService.getProblemDetails(pMeta.id);
  const p = { ...pMeta, ...(pDetails||{}) };
  
  const sols = await window.dbService.getSolutions(pMeta.id);
  currentSolutions = sols || { py:'', cpp:'', c:'', java:'' };

  currentIdx = idx;
  dirty = false;
  
  loadProblemToEditor(p);
}

function loadProblemToEditor(p) {
  showEditor();
  switchTab('info');
  document.querySelectorAll('#problem-list .list-item').forEach(el => el.classList.remove('active'));
  const listItem = document.getElementById('list-item-' + currentIdx);
  if (listItem) listItem.classList.add('active');

  // 基本欄位
  document.getElementById('f-id').value    = p.id;
  document.getElementById('f-title').value = p.title;
  document.getElementById('f-topic').value = p.topic || '';
  document.getElementById('f-date').value  = p.date  || '';
  document.getElementById('f-source').value= p.source|| '';
  document.getElementById('f-url').value   = p.url   || '';

  // 說明與提示
  document.getElementById('f-desc').value        = p.desc        || '';
  document.getElementById('f-input-desc').value  = p.input_desc  || '';
  document.getElementById('f-output-desc').value = p.output_desc || '';
  document.getElementById('f-hint').value        = p.hint        || '';

  // 難度與分類
  selectDiff(p.diff || 'easy');
  document.getElementById('f-category').value = p.categoryId || '';

  // 工具列標題
  document.getElementById('toolbar-title').textContent = p.title || '未命名題目';
  document.getElementById('toolbar-id').textContent    = p.id;

  // 範例測資
  const container = document.getElementById('samples-container');
  container.innerHTML = '';
  if (p.samples && p.samples.length > 0) {
    p.samples.forEach(s => {
      const idx = container.querySelectorAll('.sample-block').length;
      container.insertAdjacentHTML('beforeend', buildSampleBlock(idx, s.input, s.output));
    });
  } else {
    addSample();
  }

  // 解答
  switchSolLang('py');
  dirty = false;
}

// ── 難度選擇 ─────────────────────────────────────────────────────────────────

function selectDiff(diff) {
  document.querySelectorAll('.diff-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.diff === diff);
  });
}

function getSelectedDiff() {
  const el = document.querySelector('.diff-opt.selected');
  return el ? el.dataset.diff : 'easy';
}

// ── 範例測資 ─────────────────────────────────────────────────────────────────

/** 把測資陣列渲染為可編輯的 UI 區塊 */
function renderSamples(samples) {
  const container = document.getElementById('samples-container');
  container.innerHTML = samples.map((s, i) => buildSampleBlock(i, s.input, s.output)).join('');
}

function buildSampleBlock(idx, inputVal, outputVal) {
  return `<div class="sample-block" id="sample-${idx}">
    <div class="sample-hdr">
      <span>範例 ${idx + 1}</span>
      <button class="btn-sm danger" onclick="removeSample(${idx})">✕ 移除</button>
    </div>
    <div class="sample-body">
      <div class="sample-col">
        <label>輸入</label>
        <textarea id="sample-input-${idx}" class="mono" oninput="dirty=true">${escH(inputVal || '')}</textarea>
      </div>
      <div class="sample-col">
        <label>輸出</label>
        <textarea id="sample-output-${idx}" class="mono" oninput="dirty=true">${escH(outputVal || '')}</textarea>
      </div>
    </div>
  </div>`;
}

function addSample() {
  const container = document.getElementById('samples-container');
  const idx = container.querySelectorAll('.sample-block').length;
  container.insertAdjacentHTML('beforeend', buildSampleBlock(idx, '', ''));
  dirty = true;
}

function removeSample(idx) {
  const samples = collectSamples();
  samples.splice(idx, 1);
  renderSamples(samples);
  dirty = true;
}

/** 從 DOM 收集當前所有測資 */
function collectSamples() {
  const blocks = document.querySelectorAll('.sample-block');
  return Array.from(blocks).map((_, i) => ({
    input:  document.getElementById(`sample-input-${i}`)?.value  || '',
    output: document.getElementById(`sample-output-${i}`)?.value || '',
  }));
}

// ── 解答編輯器 ───────────────────────────────────────────────────────────────

function switchSolLang(lang) {
  // 儲存當前語言的編輯內容到記憶體
  currentSolutions[currentSolLang] = solEditor.getValue();
  
  // 切換 tab 樣式
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.getElementById(`sol-tab-${lang}`);
  if (activeTab) activeTab.classList.add('active');

  currentSolLang = lang;
  if (currentIdx !== null) {
    loadSolEditor(PROBLEMS[currentIdx].id, lang);
  }

  // 更新語言說明
  document.getElementById('sol-lang-note').textContent = LANG_CONFIG[lang]?.note || '';
  // 更新編輯器語法模式
  solEditor.setOption('mode', LANG_CONFIG[lang]?.mode || 'text/plain');
}

function loadSolEditor(pid, lang) {
  const code = currentSolutions[lang] || '';
  solEditor.setValue(code);
  solEditor.setOption('mode', LANG_CONFIG[lang]?.mode || 'text/plain');
  // 清除 change flag（避免剛載入就顯示 dirty）
  setTimeout(() => { dirty = false; }, 100);
}

function clearSolEditor() {
  if (!confirm('確定要清空此語言的解答？')) return;
  solEditor.setValue('');
  dirty = true;
}

// ── Tab 切換 ─────────────────────────────────────────────────────────────────

function switchTab(tab) {
  ['info', 'sol'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`content-${t}`).classList.toggle('active', t === tab);
  });
  // 切到解答 tab 時刷新 CodeMirror 尺寸
  if (tab === 'sol') setTimeout(() => solEditor.refresh(), 0);
}

// ── 新增題目 ─────────────────────────────────────────────────────────────────

function newProblem() {
  if (dirty && !confirm('有未儲存的變更，確定要新增題目嗎？')) return;

  // 產生不重複的 custom ID
  const existing = new Set(PROBLEMS.map(p => p.id));
  let n = PROBLEMS.length + 1;
  let id = `custom_${String(n).padStart(3, '0')}`;
  while (existing.has(id)) { n++; id = `custom_${String(n).padStart(3, '0')}`; }

  const newP = {
    id, title: '新題目', topic: '', date: '', diff: 'easy',
    desc: '', input_desc: '', output_desc: '', hint: '',
    samples: [{ input: '', output: '' }],
  };

  PROBLEMS.push(newP);
  currentIdx = PROBLEMS.length - 1;
  currentSolutions = {};
  dirty = false;

  renderList();
  loadProblemToEditor(newP);
  showEditor();

  // 聚焦到標題欄
  setTimeout(() => document.getElementById('f-title').focus(), 50);
  toast('已新增空白題目，請填寫後儲存', 'info');
}

// ── 從表單收集題目資料 ───────────────────────────────────────────────────────

function collectProblemFromForm() {
  const id    = document.getElementById('f-id').value.trim();
  const title = document.getElementById('f-title').value.trim();

  if (!id)    { toast('題目 ID 不可為空', 'error'); return null; }
  if (!title) { toast('題目標題不可為空', 'error'); return null; }

  // ID 唯一性檢查（新增時）
  const isDuplicate = PROBLEMS.some((p, i) => p.id === id && i !== currentIdx);
  if (isDuplicate) { toast(`ID "${id}" 已被其他題目使用`, 'error'); return null; }

  return {
    id,
    title,
    topic:      document.getElementById('f-topic').value.trim(),
    date:       document.getElementById('f-date').value.trim(),
    source:     document.getElementById('f-source').value.trim(),
    url:        document.getElementById('f-url').value.trim(),
    diff:       getSelectedDiff(),
    categoryId: document.getElementById('f-category').value,
    desc:       document.getElementById('f-desc').value,
    input_desc: document.getElementById('f-input-desc').value,
    output_desc:document.getElementById('f-output-desc').value,
    hint:       document.getElementById('f-hint').value,
    samples:    collectSamples(),
  };
}

// ── 儲存 ─────────────────────────────────────────────────────────────────────

/**
 * 1. 從表單收集題目資料
 * 2. 把解答編輯器的當前內容存回記憶體
 * 3. 呼叫 API 同時寫入 problems.js 與 solutions.js
 */
async function saveCurrent() {
  if (currentIdx === null) return;

  // 收集題目詳情
  const p = collectProblemFromForm();
  if (!p) return;

  // 把解答編輯器內容存回記憶體
  currentSolutions[currentSolLang] = solEditor.getValue();

  // 更新記憶體中的 meta 題目
  const meta = { id: p.id, title: p.title, categoryId: p.categoryId, topic: p.topic, date: p.date, diff: p.diff };
  if (currentIdx !== null) {
    PROBLEMS[currentIdx] = meta;
  } else {
    PROBLEMS.push(meta);
    currentIdx = PROBLEMS.length - 1;
  }

  // 更新工具列
  document.getElementById('toolbar-title').textContent = p.title;
  document.getElementById('toolbar-id').textContent    = p.id;

  const statusEl = document.getElementById('save-status');
  statusEl.textContent = '儲存中...';

  try {
    // Save to Firebase
    await window.dbService.saveMeta(CATEGORIES, PROBLEMS);
    await window.dbService.saveProblemDetails(p.id, p);
    await window.dbService.saveSolutions(p.id, currentSolutions);

    dirty = false;
    renderList();
    statusEl.textContent = `已儲存 ${new Date().toLocaleTimeString()}`;
    toast('儲存成功！資料已同步至 Firebase', 'success');
  } catch (e) {
    statusEl.textContent = '儲存失敗';
    toast('儲存失敗：' + e.message, 'error');
  }
}

// ── 刪除 ─────────────────────────────────────────────────────────────────────

let pendingDeleteIdx = null;

function deleteProblem() {
  if (currentIdx === null) return;
  pendingDeleteIdx = currentIdx;
  const p = PROBLEMS[currentIdx];
  document.getElementById('delete-msg').textContent =
    `確定要刪除「${p.title}」（ID: ${p.id}）嗎？刪除後需點「儲存到檔案」才會永久生效。`;
  document.getElementById('delete-dialog').classList.add('open');
}

function closeDeleteDialog() {
  document.getElementById('delete-dialog').classList.remove('open');
  pendingDeleteIdx = null;
}

async function confirmDelete() {
  if (pendingDeleteIdx === null) return;
  const pid = PROBLEMS[pendingDeleteIdx].id;

  // 從記憶體移除
  PROBLEMS.splice(pendingDeleteIdx, 1);

  try {
    await window.dbService.deleteProblem(pid);
    await window.dbService.saveMeta(CATEGORIES, PROBLEMS);
    
    closeDeleteDialog();
    currentIdx = null;
    renderList();
    hideEditor();
    toast(`「${pid}」已刪除並同步至 Firebase`, 'info');
  } catch(e) {
    toast('刪除失敗：' + e.message, 'error');
  }
}

// ── UI 切換 ──────────────────────────────────────────────────────────────────

function showEditor() {
  document.getElementById('empty-state').style.display    = 'none';
  document.getElementById('editor-container').style.display = 'flex';
}

function hideEditor() {
  document.getElementById('empty-state').style.display    = 'flex';
  document.getElementById('editor-container').style.display = 'none';
}

// ── Toast 通知 ───────────────────────────────────────────────────────────────

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── 分類管理 ──────────────────────────────────────────────────────────────────

function openCategoryDialog() {
  renderCategoryDialog();
  document.getElementById('category-dialog').classList.add('open');
}

function closeCategoryDialog() {
  document.getElementById('category-dialog').classList.remove('open');
}

function renderCategoryDialog() {
  const list = document.getElementById('category-list');
  const parentSelect = document.getElementById('new-cat-parent');
  
  // 建立分類樹狀結構
  const roots = CATEGORIES.filter(c => !c.parentId).sort((a,b) => a.order - b.order);
  
  let html = '';
  let parentOptions = '<option value="">(無父層級 - 作為主分類)</option>';

  roots.forEach(r => {
    html += `<div style="display:flex; justify-content:space-between; align-items:center; padding: 6px 8px; border-bottom: 1px solid var(--border);">
      <div><strong style="color:var(--accent)">${escH(r.name)}</strong> <span style="font-size:10px;color:var(--text-muted);">(ID: ${r.id})</span></div>
      <button class="btn-sm danger" onclick="deleteCategory('${r.id}')">刪除</button>
    </div>`;
    parentOptions += `<option value="${r.id}">${escH(r.name)}</option>`;

    const children = CATEGORIES.filter(c => c.parentId === r.id).sort((a,b) => a.order - b.order);
    children.forEach(c => {
      html += `<div style="display:flex; justify-content:space-between; align-items:center; padding: 6px 8px 6px 30px; border-bottom: 1px solid rgba(48,54,61,.3);">
        <div>└ ${escH(c.name)} <span style="font-size:10px;color:var(--text-muted);">(ID: ${c.id})</span></div>
        <button class="btn-sm danger" onclick="deleteCategory('${c.id}')">刪除</button>
      </div>`;
    });
  });

  list.innerHTML = html || '<div style="color:var(--text-muted);font-size:12px;text-align:center;">尚無分類</div>';
  parentSelect.innerHTML = parentOptions;
}

function addCategory() {
  const nameInput = document.getElementById('new-cat-name');
  const parentSelect = document.getElementById('new-cat-parent');
  const name = nameInput.value.trim();
  const parentId = parentSelect.value || null;

  if (!name) {
    toast('請輸入分類名稱', 'error');
    return;
  }

  const newId = 'cat_' + Date.now().toString(36);
  const order = CATEGORIES.filter(c => c.parentId === parentId).length + 1;

  CATEGORIES.push({ id: newId, name, parentId, order });
  nameInput.value = '';
  renderCategoryDialog();
  updateCategoryDropdown();
  renderSidebarFilters();
  
  // 自動儲存
  saveCategoriesToDisk();
}

function deleteCategory(id) {
  if (!confirm('確定要刪除此分類嗎？這不會刪除底下的題目，但題目的分類將被清除。')) return;
  
  // 刪除此分類及其子分類
  const toDelete = new Set([id]);
  CATEGORIES.forEach(c => { if (c.parentId === id) toDelete.add(c.id); });

  CATEGORIES = CATEGORIES.filter(c => !toDelete.has(c.id));
  
  // 清除題目的 categoryId
  PROBLEMS.forEach(p => {
    if (toDelete.has(p.categoryId)) p.categoryId = '';
  });

  renderCategoryDialog();
  updateCategoryDropdown();
  renderSidebarFilters();
  
  // 自動儲存
  saveCategoriesToDisk();
}

async function saveCategoriesToDisk() {
  try {
    const res = await fetch('/api/save/categories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ categories: CATEGORIES })
    });
    if (!res.ok) throw new Error('API Error');
    toast('分類已儲存', 'success');
  } catch (e) {
    toast('儲存分類失敗', 'error');
  }
}

function updateCategoryDropdown() {
  const select = document.getElementById('f-category');
  const currentVal = select.value;
  
  const roots = CATEGORIES.filter(c => !c.parentId).sort((a,b) => a.order - b.order);
  let html = '<option value="">(無)</option>';
  
  roots.forEach(r => {
    html += `<option value="${r.id}" style="font-weight:bold;">${escH(r.name)}</option>`;
    const children = CATEGORIES.filter(c => c.parentId === r.id).sort((a,b) => a.order - b.order);
    children.forEach(c => {
      html += `<option value="${c.id}">&nbsp;&nbsp;&nbsp;└ ${escH(c.name)}</option>`;
    });
  });
  
  select.innerHTML = html;
  select.value = currentVal;
}

function renderSidebarFilters() {
  const container = document.getElementById('sidebar-filters');
  const roots = CATEGORIES.filter(c => !c.parentId).sort((a,b) => a.order - b.order);
  
  let html = `<button class="filter-btn ${filterCategory === 'all' ? 'active' : ''}" data-cat="all" onclick="setFilter(this,'all')">全部</button>`;
  
  roots.forEach(r => {
    const active = filterCategory === r.id ? 'active' : '';
    html += `<button class="filter-btn ${active}" data-cat="${r.id}" onclick="setFilter(this,'${r.id}')">${escH(r.name)}</button>`;
  });
  
  container.innerHTML = html;
}

// ── 工具函數 ─────────────────────────────────────────────────────────────────

function escH(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
